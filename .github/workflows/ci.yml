name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare generated assets
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.7

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.50.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Check generated database code is untracked
        run: |
          tracked="$(git ls-files -- internal/platform/db/db.go internal/platform/db/models.go 'internal/platform/db/*.sql.go')"
          if [ -n "$tracked" ]; then
            printf 'sqlc output must be generated by task generate, not committed:\n%s\n' "$tracked" >&2
            exit 1
          fi

      - name: Check generated build inputs are untracked
        run: |
          tracked="$(git ls-files -- docs/catalog.json docs/search-index.sqlite3 docs/configuration.md docs/visuals/examples.gen.json 'docs/api/*.md' docs/api/operations.json docs/reference/cli docs/reference/config internal/config/config_gen.go internal/configspec/names_gen.go web/generated)"
          if [ -n "$tracked" ]; then
            printf 'derived build inputs must be generated, not committed:\n%s\n' "$tracked" >&2
            exit 1
          fi

      - name: Generate checked build inputs
        run: task generate

      - name: Check generated configuration
        run: task config:check

      - name: Check generated documentation
        run: task docs:check

      - name: Check public contract snapshots
        run: |
          changed="$(git status --porcelain -- .env.example docs/api/openapi.yaml schemas/config schemas/json)"
          test -z "$changed" || { printf 'public contract snapshots are stale:\n%s\n' "$changed" >&2; exit 1; }

      - name: Check generation is deterministic
        run: |
          generated_paths=(
            .env.example
            api/gen
            docs/api
            docs/catalog.json
            docs/configuration.md
            docs/reference/cli
            docs/reference/config
            docs/search-index.sqlite3
            docs/visuals/examples.gen.json
            internal/api/gen
            internal/cli/gen
            internal/config/config_gen.go
            internal/configspec/names_gen.go
            internal/platform/db/db.go
            internal/platform/db/models.go
            internal/platform/db/*.sql.go
            internal/ui/signals/models.gen.go
            schemas
            web/generated
          )
          find "${generated_paths[@]}" -type f -print0 | sort -z | xargs -0 sha256sum > /tmp/generated-before.sha256
          rm -rf \
            .task \
            api/gen \
            docs/reference/cli \
            docs/reference/config \
            internal/api/gen \
            internal/cli/gen \
            schemas/config \
            schemas/json \
            web/generated
          rm -f \
            .env.example \
            docs/api/*.md \
            docs/api/openapi.yaml \
            docs/catalog.json \
            docs/configuration.md \
            docs/search-index.sqlite3 \
            docs/visuals/examples.gen.json \
            internal/config/config_gen.go \
            internal/configspec/names_gen.go \
            internal/platform/db/db.go \
            internal/platform/db/models.go \
            internal/platform/db/*.sql.go \
            internal/ui/signals/models.gen.go
          task generate
          find "${generated_paths[@]}" -type f -print0 | sort -z | xargs -0 sha256sum > /tmp/generated-after.sha256
          diff -u /tmp/generated-before.sha256 /tmp/generated-after.sha256

      - name: Build browser assets
        run: task build

      - name: Build public site assets
        run: task site:build

      - name: Upload generated assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-assets
          retention-days: 1
          if-no-files-found: error
          path: |
            api/gen/
            internal/api/gen/
            internal/cli/gen/
            internal/config/config_gen.go
            internal/configspec/names_gen.go
            internal/platform/db/db.go
            internal/platform/db/models.go
            internal/platform/db/*.sql.go
            internal/ui/signals/models.gen.go
            docs/catalog.json
            docs/search-index.sqlite3
            docs/visuals/examples.gen.json
            docs/configuration.md
            docs/api/*.md
            docs/api/operations.json
            docs/reference/cli/
            docs/reference/config/
            schemas/json/
            web/generated/
            static/
            site/static/

  go-tests:
    name: Go tests
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download generated assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-assets
          path: .

      - name: Start MinIO source integration service
        run: |
          docker run --detach --name leapview-minio \
            --publish 127.0.0.1:9000:9000 \
            --env MINIO_ROOT_USER=leapview \
            --env MINIO_ROOT_PASSWORD=leapview-integration-secret \
            minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e \
            server /data --address :9000
          attempt=0
          until curl --fail --silent http://127.0.0.1:9000/minio/health/ready >/dev/null; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 60 ]; then
              docker logs leapview-minio
              exit 1
            fi
            sleep 1
          done

      - name: Run Go tests
        env:
          LEAPVIEW_TEST_MINIO_ENDPOINT: http://127.0.0.1:9000
        run: go test ./...

  site-image:
    name: Public site image
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build production site image
        run: docker build --file Dockerfile.site --tag leapview-site:ci .

  frontend-tests:
    name: Frontend tests (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            tests: |
              bun run test:primer-primitives
              bun run test:primer-alignment
              bun run test:theme
              bun run test:datastar-lit
              bun run test:app-shell
              bun run typecheck:app
              bun run typecheck:contracts
              bun run test:production-assets
              bun run test:movielens-performance-harness
          - name: reports
            tests: |
              bun run test:interaction-selection
              bun run test:record-table
              bun run test:visual-modal
              bun run test:catalog-page
              bun run test:dashboard-page
              bun run test:windowed-table
              bun run test:filter-menu
          - name: chat
            tests: |
              bun run test:chat-composer
              bun run test:chat-page
              bun run test:chat-thread
              bun run test:code-block
              bun run test:markdown-view
          - name: workspace
            tests: |
              bun run test:workspace-page
              bun run test:data-explorer
              bun run test:admin-page
              bun run test:code-editor
              bun run test:login-page
              bun run test:asset-lineage
              bun run test:semantic-model-graph
              bun run test:datastar-inspector
              bun run test:topology-background
          - name: site
            tests: |
              bun run test:docs-diagrams
              bun run test:site

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.7

      - name: Set up Go for public site tests
        if: matrix.name == 'site'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install browser dependencies
        run: bunx playwright install --with-deps chromium

      - name: Download generated assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-assets
          path: .

      - name: Run frontend tests
        run: ${{ matrix.tests }}

  go-analysis:
    name: Go static and race analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download generated assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-assets
          path: .

      - name: Run Go static analysis
        run: go vet ./...

      - name: Run race-sensitive package tests
        run: go test -race ./pkg/... ./internal/access ./internal/runtimehost

  ui-route-qa:
    name: UI route QA
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.7

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.50.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install JavaScript and browser dependencies
        run: |
          bun install --frozen-lockfile
          bunx playwright install --with-deps chromium

      - name: Download generated assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-assets
          path: .

      - name: Run UI route QA
        run: task qa:ui-framework

  node-audit:
    name: JavaScript dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.7

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Run JavaScript dependency audit
        run: bun audit

  go-vuln:
    name: Go vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download generated assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-assets
          path: .

      - name: Run Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  production-image:
    name: Production image
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build production image
        run: docker build --pull --tag leapview:ci .

      - name: Smoke test production image
        run: ./scripts/smoke_production_image.sh leapview:ci

  deployment-contracts:
    name: Deployment contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Test deployment lifecycle
        run: go test ./deploy/compose ./deploy/hetzner

      - name: Lint workflow definitions
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint deployment scripts
        run: >-
          docker run --rm -v "$PWD:/mnt:ro"
          koalaman/shellcheck:stable@sha256:bb596a0d169b85ddd81d8b6d3a2ff6d5baf5fca10b97f575ebc647c3dff62b3d
          deploy/hetzner/files/leapviewctl-wrapper
          deploy/hetzner/files/leapview-backup-hook
          deploy/hetzner/files/provision.sh.tftpl

      - name: Initialize Terraform providers
        working-directory: deploy/hetzner
        run: terraform init -backend=false -input=false

      - name: Validate Terraform contracts
        working-directory: deploy/hetzner
        run: |
          terraform fmt -check -recursive
          terraform validate
          terraform test

  candidate-image:
    name: Publish candidate image
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: prepare
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish candidate
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/yacobolo/leapview:candidate-${{ github.sha }}
          build-args: |
            BUILD_VERSION=candidate-${{ github.sha }}
            BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Attest candidate provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ghcr.io/yacobolo/leapview
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Record immutable candidate reference
        run: echo 'ghcr.io/yacobolo/leapview@${{ steps.publish.outputs.digest }}' >> "$GITHUB_STEP_SUMMARY"
