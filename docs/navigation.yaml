sections:
  - id: start
    title: Start here
    summary: Install LeapView, run the sample workspace, and understand the project layout.
    documents:
      - slug: introduction
        title: What is LeapView?
        type: explanation
        summary: Understand the problems LeapView solves and its code-native model.
        source: articles/start/introduction.md
      - slug: installation
        title: Installation
        type: how-to
        summary: Pull the public image locally or prepare a durable production instance.
        source: articles/start/installation.md
      - slug: getting-started
        title: Get started with LeapView
        type: landing
        summary: Choose a path from installation through your first validated dashboard change.
        source: getting-started.md
        breadcrumb: Getting started
      - slug: first-dashboard
        title: Build your first dashboard
        type: tutorial
        summary: Change a model and dashboard and deploy it locally.
        source: articles/start/first-dashboard.md
      - slug: project-structure
        title: Project structure
        type: explanation
        summary: Learn how project-global resources and workspace resources are organized.
        source: articles/start/project-structure.md

  - id: concepts
    title: Core concepts
    summary: Learn the resource model and runtime ideas behind LeapView.
    documents:
      - slug: concepts
        title: Core concepts
        type: landing
        navigationTitle: Overview
        summary: A map of the concepts used throughout LeapView.
        source: articles/concepts/overview.md
      - slug: concepts/projects-workspaces-environments
        title: Projects, workspaces, and environments
        type: explanation
        summary: Understand ownership, isolation, and deployment scope.
        source: articles/concepts/projects-workspaces-environments.md
      - slug: concepts/connections-sources
        title: Connections and sources
        type: explanation
        summary: Separate physical data access from reusable logical source definitions.
        source: articles/concepts/connections-sources.md
      - slug: concepts/managed-data
        title: Managed data and revisions
        type: explanation
        summary: Understand immutable revisions, staging, activation, upload boundaries, and storage ownership.
        source: articles/concepts/managed-data.md
      - slug: concepts/model-tables
        title: Model tables
        type: explanation
        summary: Materialize reusable analytical tables from source data.
        source: articles/concepts/model-tables.md
      - slug: concepts/semantic-models
        title: Semantic models
        type: explanation
        summary: Define datasets, dimensions, measures, and relationships once.
        source: articles/concepts/semantic-models.md
      - slug: concepts/dashboards
        title: Dashboards, pages, and visuals
        type: explanation
        summary: Understand the presentation resources rendered by the BI workspace.
        source: articles/concepts/dashboards.md
      - slug: concepts/query-lifecycle
        title: Query and interaction lifecycle
        type: explanation
        summary: Follow a user interaction from signals through DuckDB and back.
        source: articles/concepts/query-lifecycle.md

  - id: build
    title: Build dashboards
    summary: Author data resources, semantic models, dashboards, and interactions.
    documents:
      - slug: guides/build
        title: Build dashboards
        type: landing
        navigationTitle: Overview
        summary: Follow the dashboard-as-code authoring workflow.
        source: articles/build/overview.md
      - slug: guides/build/connect-data
        title: Connect a data source
        type: how-to
        summary: Add a connection and source definitions to a project.
        source: articles/build/connect-data.md
      - slug: guides/build/model-tables
        title: Define model tables
        type: how-to
        summary: Turn source data into stable analytical tables.
        source: articles/build/model-tables.md
      - slug: guides/build/semantic-model
        title: Build a semantic model
        type: how-to
        summary: Expose reusable fields, measures, and relationships.
        source: articles/build/semantic-model.md
      - slug: guides/build/dashboard
        title: Create a dashboard
        type: how-to
        summary: Define a workspace dashboard and its first report page.
        source: articles/build/dashboard.md
      - slug: guides/build/pages-layout
        title: Pages and layout
        type: how-to
        summary: Compose responsive report pages from code.
        source: articles/build/pages-layout.md
      - slug: guides/build/filters-interactions
        title: Filters and interactions
        type: how-to
        summary: Configure filter cards and cross-visual selections.
        source: articles/build/filters-interactions.md
      - slug: guides/build/tables
        title: Tables, matrices, and pivots
        type: how-to
        summary: Choose and configure tabular BI surfaces.
        source: articles/build/tables.md
      - slug: guides/build/patterns
        title: Dashboard authoring patterns
        type: explanation
        summary: Apply maintainable modeling and presentation conventions.
        source: articles/build/patterns.md

  - id: data
    title: Manage data
    summary: Stage immutable revisions, refresh analytical tables, and recover safely.
    documents:
      - slug: data-ingestion
        title: Managed data ingestion
        type: landing
        navigationTitle: Overview
        summary: Plan, stage, and activate immutable project-global data revisions.
        source: data-ingestion.md
      - slug: guides/data/revisions
        title: Data revisions and activation
        type: how-to
        summary: Understand revision identity and atomic activation.
        source: articles/data/revisions.md
      - slug: guides/data/refresh
        title: Materialization and refresh
        type: how-to
        summary: Refresh model tables without disrupting active queries.
        source: articles/data/refresh.md
      - slug: guides/data/storage-recovery
        title: Storage and recovery
        type: how-to
        summary: Operate local or object-backed analytical storage safely.
        source: articles/data/storage-recovery.md
      - slug: guides/data/troubleshooting
        title: Data troubleshooting
        type: how-to
        summary: Diagnose planning, upload, revision, and refresh failures.
        source: articles/data/troubleshooting.md

  - id: operate
    title: Deploy and operate
    summary: Move reviewed projects into environments and run LeapView in production.
    documents:
      - slug: guides/operate
        title: Deploy and operate LeapView
        type: landing
        navigationTitle: Overview
        summary: Understand the production delivery and operations workflow.
        source: articles/operate/overview.md
      - slug: cli/validate-deploy
        title: Validate, plan, and deploy
        type: how-to
        summary: Use the standard atomic delivery workflow.
        source: guides/cli/validate-deploy.md
      - slug: cli/targets
        title: Targets and environments
        type: how-to
        summary: Keep local, staging, and production changes explicit.
        source: guides/cli/targets.md
      - slug: guides/operate/production-configuration
        title: Production configuration
        type: how-to
        summary: Configure secrets, storage, auth, and runtime boundaries.
        source: articles/operate/production-configuration.md
      - slug: guides/operate/self-hosting
        title: Self-hosting
        type: how-to
        summary: Build and run a supported single-node deployment.
        source: articles/operate/self-hosting.md
      - slug: guides/operate/observability
        title: Health and observability
        type: how-to
        summary: Monitor health, query activity, refreshes, and deployments.
        source: articles/operate/observability.md
      - slug: guides/operate/backup-restore
        title: Backup and restore
        type: how-to
        summary: Create, validate, and restore consistent instance backups.
        source: articles/operate/backup-restore.md
      - slug: guides/operate/upgrades
        title: Upgrades and migrations
        type: how-to
        summary: Upgrade binaries and persistent state with rollback boundaries.
        source: articles/operate/upgrades.md
      - slug: guides/operate/troubleshooting
        title: Operational troubleshooting
        type: how-to
        summary: Diagnose deployment and runtime failures systematically.
        source: articles/operate/troubleshooting.md

  - id: security
    title: Security and administration
    summary: Configure identity, authorization, credentials, and auditing.
    documents:
      - slug: enterprise-auth
        title: Authentication and authorization
        type: landing
        navigationTitle: Overview
        summary: Understand LeapView identity and authorization boundaries.
        source: enterprise-auth.md
      - slug: security/local-auth
        title: Local authentication
        type: how-to
        summary: Configure self-hosted and break-glass local users.
        source: articles/security/local-auth.md
      - slug: security/oidc
        title: OIDC
        type: how-to
        summary: Connect an enterprise identity provider for browser login.
        source: articles/security/oidc.md
      - slug: security/scim
        title: SCIM provisioning
        type: how-to
        summary: Provision users, groups, and memberships from a directory.
        source: articles/security/scim.md
      - slug: security/authorization
        title: Roles, grants, and policies
        type: explanation
        summary: Assign least-privilege access to securable resources.
        source: articles/security/authorization.md
      - slug: security/tokens
        title: Service principals and API tokens
        type: how-to
        summary: Authenticate non-human workloads with scoped credentials.
        source: articles/security/tokens.md
      - slug: security/audit
        title: Audit events
        type: how-to
        summary: Inspect security and administrative activity.
        source: articles/security/audit.md

  - id: integrate
    title: Integrate
    summary: Automate LeapView through the CLI, API, and agent surfaces.
    documents:
      - slug: integrate
        title: Integrate with LeapView
        type: landing
        navigationTitle: Overview
        summary: Choose between CLI, API, and agent integration surfaces.
        source: articles/integrate/overview.md
      - slug: cli
        title: CLI overview
        type: landing
        summary: Install, authenticate, validate, plan, and deploy with the CLI.
        source: guides/cli/overview.md
      - slug: cli/authentication
        title: Install and authenticate the CLI
        type: how-to
        summary: Configure targets and use API tokens safely.
        source: guides/cli/authentication.md
      - slug: guides/integrate/api-quickstart
        title: API quickstart
        type: tutorial
        summary: Authenticate and call the headless API.
        source: articles/integrate/api-quickstart.md
      - slug: guides/integrate/api-conventions
        title: API conventions
        type: reference
        summary: Handle authentication, errors, and pagination consistently.
        source: articles/integrate/api-conventions.md
      - slug: guides/integrate/headless-bi
        title: Headless BI queries
        type: how-to
        summary: Query dashboards and semantic models through stable contracts.
        source: articles/integrate/headless-bi.md
      - slug: guides/integrate/public-dashboards
        title: Public and embedded dashboards
        type: how-to
        summary: Publish an anonymous governed dashboard and embed it on an allowed origin.
        source: articles/integrate/public-dashboards.md
      - slug: guides/integrate/agent
        title: Agent integrations
        type: how-to
        summary: Use global conversations and the shared governed tool catalog.
        source: articles/integrate/agent.md
      - slug: guides/integrate/mcp
        title: Connect an MCP host
        type: how-to
        summary: Connect Claude and other MCP hosts to a LeapView deployment over OAuth.
        source: articles/integrate/mcp.md
      - slug: cli/automation
        title: Automation and CI
        type: how-to
        summary: Run validation and deployments safely in CI.
        source: guides/cli/automation.md

  - id: reference
    title: Reference
    summary: Exact generated contracts for configuration, commands, APIs, and visuals.
    documents:
      - slug: reference
        title: Reference
        type: landing
        navigationTitle: Overview
        summary: Find exact syntax and supported contracts.
        source: articles/reference/overview.md
      - slug: configuration
        title: Environment variable reference
        type: reference
        summary: Process-wide settings generated from the runtime configuration specification.
        source: configuration.md
        breadcrumb: Environment variables
        generated: true
      - slug: reference/capabilities
        title: Supported capabilities
        type: reference
        summary: Review supported resource, data, visual, and integration surfaces.
        source: articles/reference/capabilities.md
      - slug: cli/troubleshooting
        title: CLI troubleshooting
        type: how-to
        summary: Diagnose local validation and remote operation failures.
        source: guides/cli/troubleshooting.md
    groups:
      - id: configuration
        title: Configuration
        summary: Generated fields and JSON Schemas for every resource kind.
        collection:
          kind: catalog
          catalog: reference/config/catalog.json
          sourceDir: reference/config
          slugPrefix: config
          index:
            slug: config
            title: Configuration reference
            type: reference
            navigationTitle: Overview
            summary: Choose a resource kind and open its generated field reference and JSON Schema.
            source: articles/reference/configuration.md
      - id: commands
        title: CLI commands
        summary: Usage and flags generated from the Cobra command tree.
        collection:
          kind: catalog
          catalog: reference/cli/catalog.json
          sourceDir: reference/cli
          slugPrefix: cli
          index:
            slug: cli/reference
            title: CLI command reference
            type: reference
            navigationTitle: Overview
            summary: Browse every generated LeapView command.
            source: reference/cli/index.md
            generated: true
      - id: api
        title: API reference
        summary: Operations generated from the OpenAPI contract.
        collection:
          kind: catalog
          catalog: api/catalog.json
          sourceDir: api
          slugPrefix: api
          index:
            slug: api
            title: API reference
            type: reference
            navigationTitle: Overview
            summary: Browse the generated headless API contract.
            source: api/index.md
            generated: true
      - id: visuals
        title: Visuals
        summary: Configuration and live examples for every visual type.
        collection:
          kind: visual
          catalog: visuals/catalog.json
          sourceDir: visuals
          slugPrefix: visuals
          index:
            slug: visuals/overview
            title: Visual types
            type: reference
            navigationTitle: Overview
            summary: Choose from every supported LeapView visual type.
            source: visuals/index.md
            breadcrumb: Visuals

  - id: architecture
    title: Architecture and contributing
    summary: Understand the implementation and extend LeapView safely.
    groups:
      - id: architecture
        title: Architecture
        summary: Understand the monolith, storage, runtime, and browser boundaries.
        documents:
          - slug: architecture
            title: Architecture overview
            type: explanation
            navigationTitle: Overview
            summary: See how the monolith, contracts, storage, and browser components fit together.
            source: articles/architecture/overview.md
          - slug: architecture/runtime
            title: Runtime architecture
            type: explanation
            summary: Follow routing, query execution, and streamed UI updates.
            source: articles/architecture/runtime.md
          - slug: storage-architecture
            title: Storage architecture
            type: explanation
            summary: Understand DuckLake, DuckDB, snapshots, and serving pointers.
            source: storage-architecture-spec.md
          - slug: architecture/datastar
            title: Datastar signal flow
            type: explanation
            summary: Understand server-owned state and SSE response contracts.
            source: articles/architecture/datastar.md
          - slug: architecture/visual-plugins
            title: Visualization architecture
            type: explanation
            summary: Understand the visualization IR, generated contracts, runtime data states, and renderer adapters.
            source: articles/architecture/visual-plugins.md
          - slug: architecture/geographic-rendering
            title: Geographic rendering decision
            type: explanation
            summary: Understand why MapLibre exclusively owns built-in geographic rendering.
            source: articles/architecture/geographic-rendering.md
      - id: contributing
        title: Contributing
        summary: Develop LeapView and extend its generated contracts safely.
        documents:
          - slug: contributing/repository
            title: Repository and development workflow
            type: how-to
            navigationTitle: Overview
            summary: Work effectively in the LeapView monorepo.
            source: articles/contributing/repository.md
          - slug: contributing/visual
            title: Add a visual type
            type: how-to
            summary: Extend contracts, rendering, documentation, and tests together.
            source: articles/contributing/visual.md
          - slug: contributing/configuration
            title: Add a configuration resource
            type: how-to
            summary: Extend schemas, generated references, and validation together.
            source: articles/contributing/configuration.md
          - slug: contributing/documentation
            title: Write documentation
            type: how-to
            summary: Author procedural guides and accessible diagrams that remain valid with the product.
            source: articles/contributing/documentation.md
