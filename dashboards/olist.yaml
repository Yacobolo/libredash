name: olist
title: Olist Commerce Semantic Model

sources:
  orders:
    file: olist_orders_dataset.csv
  order_items:
    file: olist_order_items_dataset.csv
  payments:
    file: olist_order_payments_dataset.csv
  products:
    file: olist_products_dataset.csv
  customers:
    file: olist_customers_dataset.csv
  reviews:
    file: olist_order_reviews_dataset.csv
  translations:
    file: product_category_name_translation.csv

cache:
  tables:
    orders_enriched:
      description: One row per order with reusable dimensions and measures for dashboard visuals.
      sql: |
        WITH revenue AS (
          SELECT order_id, SUM(try_cast(payment_value AS DOUBLE)) AS revenue
          FROM raw.payments
          GROUP BY order_id
        ),
        review AS (
          SELECT order_id, AVG(try_cast(review_score AS DOUBLE)) AS review_score
          FROM raw.reviews
          GROUP BY order_id
        ),
        category AS (
          SELECT
            oi.order_id,
            MIN(COALESCE(t.product_category_name_english, p.product_category_name, 'uncategorized')) AS category
          FROM raw.order_items oi
          LEFT JOIN raw.products p ON p.product_id = oi.product_id
          LEFT JOIN raw.translations t ON t.product_category_name = p.product_category_name
          GROUP BY oi.order_id
        )
        SELECT
          o.order_id,
          o.customer_id,
          CAST(o.order_purchase_timestamp AS TIMESTAMP) AS purchase_timestamp,
          strftime(CAST(o.order_purchase_timestamp AS TIMESTAMP), '%Y-%m') AS purchase_month,
          strftime(CAST(o.order_purchase_timestamp AS TIMESTAMP), '%Y-%m-%d') AS purchase_date,
          o.order_status AS status,
          c.customer_state AS state,
          COALESCE(category.category, 'uncategorized') AS category,
          round(COALESCE(revenue.revenue, 0), 2) AS revenue,
          round(COALESCE(review.review_score, 0), 2) AS review_score,
          CASE
            WHEN o.order_delivered_customer_date IS NULL THEN NULL
            ELSE datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP))
          END AS delivery_days,
          CASE
            WHEN o.order_delivered_customer_date IS NULL THEN NULL
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 3 THEN '0-3 days'
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 7 THEN '4-7 days'
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 14 THEN '8-14 days'
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 30 THEN '15-30 days'
            ELSE '31+ days'
          END AS delivery_bucket
        FROM raw.orders o
        JOIN raw.customers c ON c.customer_id = o.customer_id
        LEFT JOIN revenue ON revenue.order_id = o.order_id
        LEFT JOIN review ON review.order_id = o.order_id
        LEFT JOIN category ON category.order_id = o.order_id

relationships:
  - id: orders_customers
    from: raw.orders.customer_id
    to: raw.customers.customer_id
    cardinality: many_to_one
    active: true
  - id: order_items_orders
    from: raw.order_items.order_id
    to: raw.orders.order_id
    cardinality: many_to_one
    active: true
  - id: payments_orders
    from: raw.payments.order_id
    to: raw.orders.order_id
    cardinality: many_to_one
    active: true
  - id: reviews_orders
    from: raw.reviews.order_id
    to: raw.orders.order_id
    cardinality: many_to_one
    active: true
  - id: order_items_products
    from: raw.order_items.product_id
    to: raw.products.product_id
    cardinality: many_to_one
    active: true
  - id: products_translations
    from: raw.products.product_category_name
    to: raw.translations.product_category_name
    cardinality: many_to_one
    active: true

metrics:
  total_orders:
    title: Orders
    source: orders_enriched
    aggregate: count_distinct
    column: order_id
    note: Filtered order count
    tone: ink
    format: integer
  revenue:
    title: Revenue
    source: orders_enriched
    aggregate: sum
    column: revenue
    note: Cached payment value
    tone: green
    format: currency
  aov:
    title: AOV
    source: orders_enriched
    aggregate: expression
    expression: CASE WHEN COUNT(DISTINCT order_id) = 0 THEN 0 ELSE SUM(revenue) / COUNT(DISTINCT order_id) END
    note: Revenue per order
    tone: amber
    format: currency
  review:
    title: Review
    source: orders_enriched
    aggregate: avg
    column: review_score
    note: Average score
    tone: coral
    format: decimal

visuals:
  revenue:
    title: Revenue by month
    type: area
    unit: R$
    source: orders_enriched
    label: purchase_month
    aggregate: sum
    value: revenue
    order_by: purchase_month ASC
    limit: 30
  orders:
    title: Orders by status
    type: donut
    unit: orders
    source: orders_enriched
    label: status
    aggregate: count_distinct
    value: order_id
    order_by: value DESC
  categories:
    title: Top product categories
    type: bar
    unit: R$
    source: orders_enriched
    label: category
    aggregate: sum
    value: revenue
    order_by: value DESC
    limit: 10
  delivery:
    title: Delivery speed
    type: bar
    unit: orders
    source: orders_enriched
    label: delivery_bucket
    aggregate: count
    value: order_id
    where: delivery_bucket IS NOT NULL
    order_by: MIN(delivery_days) ASC

tables:
  orders:
    title: Orders
    source: orders_enriched
    default_sort:
      key: purchase_date
      direction: desc
    columns:
      - key: order_id
        label: Order
      - key: purchase_date
        label: Purchased
      - key: status
        label: Status
      - key: state
        label: State
      - key: category
        label: Category
      - key: revenue
        label: Revenue
        align: right
      - key: review_score
        label: Review
        align: right
      - key: delivery_days
        label: Delivery
        align: right

