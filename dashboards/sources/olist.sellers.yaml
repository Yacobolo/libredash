apiVersion: libredash.dev/v1
kind: Source
metadata:
  name: olist.sellers
  title: Sellers
spec:
  connection: olist
  path: olist_sellers_dataset.csv
  fields:
    seller_id: {type: string, description: Stable seller identifier used by order items.}
    seller_zip_code_prefix: {type: string, description: Five-digit Brazilian ZIP-code prefix used for geographic joins.}
    seller_city: {type: string, description: Seller city supplied by Olist.}
    seller_state: {type: string, description: Brazilian state abbreviation for the seller.}
