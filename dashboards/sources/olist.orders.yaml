apiVersion: leapview.dev/v1
kind: Source
metadata:
  name: olist.orders
  title: Orders
spec:
  connection: olist
  path: olist_orders_dataset.csv
  fields:
    order_id: {type: string, description: Raw order identifier.}
    customer_id: {type: string, description: Customer identifier attached to the order.}
    order_status: {type: string, description: Raw lifecycle status.}
    order_purchase_timestamp: {type: string, description: Timestamp when the order was placed.}
    order_delivered_customer_date: {type: string, description: Timestamp when the order reached the customer.}
