apiVersion: leapview.dev/v1
kind: Source
metadata:
  name: olist.customers
  title: Customers
spec:
  connection: olist
  path: olist_customers_dataset.csv
  fields:
    customer_id: {type: string, description: Customer identifier used by orders.}
    customer_zip_code_prefix: {type: string, description: Five-digit Brazilian ZIP-code prefix used for geographic joins.}
    customer_city: {type: string, description: Customer city supplied by Olist.}
    customer_state: {type: string, description: Brazilian state for the customer.}
