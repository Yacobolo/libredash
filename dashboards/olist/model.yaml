name: olist
title: Olist Commerce Semantic Model
description: Brazilian ecommerce semantic model backed by DuckDB import tables.

default_connection: olist

connections:
  olist:
    kind: local
    defaults:
      options:
        header: true

sources:
  orders:
    path: olist_orders_dataset.csv
  order_items:
    path: olist_order_items_dataset.csv
  payments:
    path: olist_order_payments_dataset.csv
  products:
    path: olist_products_dataset.csv
  customers:
    path: olist_customers_dataset.csv
  reviews:
    path: olist_order_reviews_dataset.csv
  translations:
    path: product_category_name_translation.csv

tables:
  orders:
    kind: fact
    description: One row per order with explicit order-grain derived fields for v1 metric-view measures.
    transform:
      sql: |
        WITH revenue AS (
          SELECT order_id, SUM(try_cast(payment_value AS DOUBLE)) AS revenue
          FROM raw.payments
          GROUP BY order_id
        ),
        review AS (
          SELECT order_id, AVG(try_cast(review_score AS DOUBLE)) AS review_score
          FROM raw.reviews
          GROUP BY order_id
        ),
        category AS (
          SELECT
            oi.order_id,
            MIN(COALESCE(t.product_category_name_english, p.product_category_name, 'uncategorized')) AS category
          FROM raw.order_items oi
          LEFT JOIN raw.products p ON p.product_id = oi.product_id
          LEFT JOIN raw.translations t ON t.product_category_name = p.product_category_name
          GROUP BY oi.order_id
        )
        SELECT
          o.order_id,
          o.customer_id,
          CAST(o.order_purchase_timestamp AS TIMESTAMP) AS purchase_timestamp,
          strftime(CAST(o.order_purchase_timestamp AS TIMESTAMP), '%Y-%m') AS purchase_month,
          strftime(CAST(o.order_purchase_timestamp AS TIMESTAMP), '%Y-%m-%d') AS purchase_date,
          o.order_status AS status,
          COALESCE(category.category, 'uncategorized') AS category,
          round(COALESCE(revenue.revenue, 0), 2) AS revenue,
          round(COALESCE(review.review_score, 0), 2) AS review_score,
          CASE
            WHEN o.order_delivered_customer_date IS NULL THEN NULL
            ELSE datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP))
          END AS delivery_days,
          CASE
            WHEN o.order_delivered_customer_date IS NULL THEN NULL
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 3 THEN '0-3 days'
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 7 THEN '4-7 days'
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 14 THEN '8-14 days'
            WHEN datediff('day', CAST(o.order_purchase_timestamp AS TIMESTAMP), CAST(o.order_delivered_customer_date AS TIMESTAMP)) <= 30 THEN '15-30 days'
            ELSE '31+ days'
          END AS delivery_bucket
        FROM raw.orders o
        LEFT JOIN revenue ON revenue.order_id = o.order_id
        LEFT JOIN review ON review.order_id = o.order_id
        LEFT JOIN category ON category.order_id = o.order_id
    primary_key: order_id
    grain: order_id
    dimensions:
      order_id:
        label: Order ID
        expr: order_id
      customer_id:
        label: Customer ID
        expr: customer_id
      purchase_month:
        label: Purchase month
        expr: purchase_month
      purchase_timestamp:
        label: Purchase timestamp
        expr: purchase_timestamp
        type: time
      purchase_date:
        label: Purchase date
        expr: purchase_date
      status:
        label: Status
        expr: status
      category:
        label: Category
        expr: category
      delivery_bucket:
        label: Delivery speed
        expr: delivery_bucket
        where: delivery_bucket IS NOT NULL
        order_expr: MIN(delivery_days)
    measures:
      order_count:
        label: Orders
        expression: COUNT(DISTINCT orders.order_id)
        unit: orders
        format: integer
      revenue:
        label: Revenue
        expression: SUM(orders.revenue)
        unit: R$
        format: currency
      revenue_min:
        label: Revenue min
        expression: MIN(orders.revenue)
        unit: R$
        format: currency
      revenue_q1:
        label: Revenue q1
        expression: quantile_cont(orders.revenue, 0.25)
        unit: R$
        format: currency
      revenue_q3:
        label: Revenue q3
        expression: quantile_cont(orders.revenue, 0.75)
        unit: R$
        format: currency
      revenue_max:
        label: Revenue max
        expression: MAX(orders.revenue)
        unit: R$
        format: currency
      aov:
        label: AOV
        expression: SUM(orders.revenue) / NULLIF(COUNT(DISTINCT orders.order_id), 0)
        unit: R$
        format: currency
      review_score:
        label: Review
        expression: AVG(orders.review_score)
        format: decimal
      delivery_days:
        label: Delivery days
        expression: AVG(orders.delivery_days)
        format: decimal
      delivery_days_min:
        label: Delivery min
        expression: MIN(orders.delivery_days)
        format: decimal
      delivery_days_q1:
        label: Delivery q1
        expression: quantile_cont(orders.delivery_days, 0.25)
        format: decimal
      delivery_days_q3:
        label: Delivery q3
        expression: quantile_cont(orders.delivery_days, 0.75)
        format: decimal
      delivery_days_max:
        label: Delivery max
        expression: MAX(orders.delivery_days)
        format: decimal
  customers:
    kind: dimension
    source: customers
    primary_key: customer_id
    grain: customer_id
    dimensions:
      customer_id:
        label: Customer ID
        expr: customer_id
      state:
        label: State
        expr: customer_state

relationships:
  - id: orders_customers
    from: orders.customer_id
    to: customers.customer_id
    cardinality: many_to_one
    active: true
  - id: order_items_orders
    from: order_items.order_id
    to: orders.order_id
    cardinality: many_to_one
    active: false
  - id: payments_orders
    from: payments.order_id
    to: orders.order_id
    cardinality: many_to_one
    active: false
  - id: reviews_orders
    from: reviews.order_id
    to: orders.order_id
    cardinality: many_to_one
    active: false
  - id: order_items_products
    from: order_items.product_id
    to: products.product_id
    cardinality: many_to_one
    active: false
  - id: products_translations
    from: products.product_category_name
    to: translations.product_category_name
    cardinality: many_to_one
    active: false
