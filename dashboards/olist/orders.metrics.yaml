id: orders
title: Orders Metrics
description: Governed order metrics and dimensions for the Olist commerce model.
semantic_model: olist
dataset: orders
timeseries: purchase_timestamp

dimensions:
  purchase_month:
    label: Purchase month
    expr: e.purchase_month
  purchase_timestamp:
    label: Purchase timestamp
    expr: e.purchase_timestamp
  purchase_date:
    label: Purchase date
    expr: e.purchase_date
  status:
    label: Status
    expr: e.status
  state:
    label: State
    expr: e.state
  category:
    label: Category
    expr: e.category
  delivery_bucket:
    label: Delivery speed
    expr: e.delivery_bucket
    where: e.delivery_bucket IS NOT NULL
    order_expr: MIN(e.delivery_days)

measures:
  order_count:
    label: Orders
    expression: COUNT(DISTINCT e.order_id)
    unit: orders
    format: integer
  revenue:
    label: Revenue
    expression: SUM(e.revenue)
    unit: R$
    format: currency
  revenue_min:
    label: Revenue min
    expression: MIN(e.revenue)
    unit: R$
    format: currency
  revenue_q1:
    label: Revenue q1
    expression: quantile_cont(e.revenue, 0.25)
    unit: R$
    format: currency
  revenue_q3:
    label: Revenue q3
    expression: quantile_cont(e.revenue, 0.75)
    unit: R$
    format: currency
  revenue_max:
    label: Revenue max
    expression: MAX(e.revenue)
    unit: R$
    format: currency
  aov:
    label: AOV
    expression: SUM(e.revenue) / NULLIF(COUNT(DISTINCT e.order_id), 0)
    unit: R$
    format: currency
  review_score:
    label: Review
    expression: AVG(e.review_score)
    format: decimal
  delivery_days:
    label: Delivery days
    expression: AVG(e.delivery_days)
    format: decimal
  delivery_days_min:
    label: Delivery min
    expression: MIN(e.delivery_days)
    format: decimal
  delivery_days_q1:
    label: Delivery q1
    expression: quantile_cont(e.delivery_days, 0.25)
    format: decimal
  delivery_days_q3:
    label: Delivery q3
    expression: quantile_cont(e.delivery_days, 0.75)
    format: decimal
  delivery_days_max:
    label: Delivery max
    expression: MAX(e.delivery_days)
    format: decimal
