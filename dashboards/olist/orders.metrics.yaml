id: orders
title: Orders Metrics
description: Governed order metrics and dimensions for the Olist commerce model.
semantic_model: olist
base_table: orders
grain: order_id

time:
  default_field: orders.purchase_timestamp
  allowed_grains: [day, week, month, quarter, year]

dimensions:
  - orders.order_id
  - orders.customer_id
  - orders.purchase_month
  - orders.purchase_timestamp
  - orders.purchase_date
  - orders.status
  - customers.state
  - orders.category
  - orders.delivery_bucket

measures:
  - orders.order_count
  - orders.revenue
  - orders.revenue_min
  - orders.revenue_q1
  - orders.revenue_q3
  - orders.revenue_max
  - orders.aov
  - orders.review_score
  - orders.delivery_days
  - orders.delivery_days_min
  - orders.delivery_days_q1
  - orders.delivery_days_q3
  - orders.delivery_days_max
