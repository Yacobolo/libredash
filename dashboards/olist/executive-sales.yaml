        kind: scatter_chart
        visual: delivery_scatter_status
        placement: { col: 7, row: 2, col_span: 6, row_span: 8 }
  - id: chart-funnel
    title: Funnel
    description: Funnel chart variations
    canvas: { width: 1366, height: 672 }
    grid: { columns: 12, row_height: 48, gap: 16, padding: 16 }
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: status-funnel
        kind: funnel_chart
        visual: status_funnel
        placement: { col: 1, row: 2, col_span: 6, row_span: 8 }
      - id: delivery-funnel
        kind: funnel_chart
        visual: delivery_funnel
        placement: { col: 7, row: 2, col_span: 6, row_span: 8 }
  - id: chart-treemap
    title: Treemap
    description: Treemap chart variations
    canvas: { width: 1366, height: 672 }
    grid: { columns: 12, row_height: 48, gap: 16, padding: 16 }
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: category-treemap
        kind: treemap_chart
        visual: category_treemap
        placement: { col: 1, row: 2, col_span: 6, row_span: 8 }
      - id: state-treemap
        kind: treemap_chart
        visual: state_treemap
        placement: { col: 7, row: 2, col_span: 6, row_span: 8 }
  - id: chart-gauge
