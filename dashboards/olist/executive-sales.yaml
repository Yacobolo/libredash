    dataset: orders
    query:
      dimensions: [category, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 60
  category_status_graph:
    title: Category and status network
    shape: graph
    renderer: echarts
    type: graph
    dataset: orders
    query:
      dimensions: [category, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 60
  state_revenue_map:
    title: Revenue by state
    shape: geo
    renderer: echarts
    type: map
    options:
      map: brazil_states
    dataset: orders
    query:
      dimensions: [state]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 27
  delivery_candlestick:
    title: Delivery day candlestick by month
    shape: ohlc
    renderer: echarts
    type: candlestick
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [delivery_days_q1, delivery_days_q3, delivery_days_min, delivery_days_max]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
  review_distribution:
    title: Review score distribution
    shape: distribution
    renderer: echarts
    type: boxplot
    dataset: orders
    query:
      dimensions: [status]
      measures: [review_score]
      sort:
        - field: status
          direction: asc
  review_delivery_combo:
    title: Review and delivery by status
    shape: category_multi_measure
    renderer: echarts
    type: combo
    options:
      series_types:
        Review: line
        Delivery days: column
    dataset: orders
    query:
      dimensions: [status]
      measures: [review_score, delivery_days]
      sort:
        - field: status
          direction: asc
  orders_waterfall:
    title: Monthly order contribution
    shape: category_delta
    renderer: echarts
    type: waterfall
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 18
  revenue_histogram:
    title: Revenue histogram
    shape: binned_measure
    renderer: echarts
    type: histogram
    options:
      bin_count: 18
    dataset: orders
    query:
      measures: [revenue]
  delivery_radar:
    title: Delivery speed radar
    shape: category_value
    renderer: echarts
    type: radar
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [order_count]
      sort:
        - field: delivery_bucket
          direction: asc
  category_status_tree:
    title: Category and status tree
    shape: hierarchy
    renderer: echarts
    type: tree
    dataset: orders
    query:
      dimensions: [category, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 80
  state_status_sunburst:
    title: State and status sunburst
    shape: hierarchy
    renderer: echarts
    type: sunburst
    dataset: orders
    query:
      dimensions: [state, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 80

tables:
  orders:
    kind: data_table
    title: Orders
    dataset: orders
    default_sort:
      key: purchase_date
      direction: desc
    columns:
      - key: order_id
        label: Order
      - key: purchase_date
        label: Purchased
      - key: status
        label: Status
      - key: state
        label: State
      - key: category
        label: Category
      - key: revenue
        label: Revenue
        align: right
      - key: review_score
        label: Review
        align: right
      - key: delivery_days
        label: Delivery
        align: right
  state_status_matrix:
    kind: matrix_table
    title: State status matrix
    dataset: orders
    rows: [state]
    columns: [status]
    measures: [order_count, revenue]
    default_sort:
      key: state
      direction: asc
  category_status_pivot:
    kind: pivot_table
    title: Category status pivot
    dataset: orders
    rows: [category]
    columns: [status]
    measures: [order_count]
    default_sort:
      key: category
      direction: asc

pages:
  - id: overview
    title: Overview
    description: Executive sales summary
    canvas:
      width: 1366
      height: 912
    grid:
      columns: 12
      row_height: 48
      gap: 16
      padding: 16
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: kpis
        kind: kpi_strip
        placement: { col: 1, row: 2, col_span: 12, row_span: 2 }
      - id: revenue
        kind: line_chart
        visual: revenue
        placement: { col: 1, row: 4, col_span: 6, row_span: 5 }
      - id: orders
        kind: bar_chart
        visual: orders
        placement: { col: 7, row: 4, col_span: 3, row_span: 5 }
      - id: delivery
        kind: bar_chart
        visual: delivery
        placement: { col: 10, row: 4, col_span: 3, row_span: 5 }
      - id: categories
        kind: bar_chart
        visual: categories
        placement: { col: 1, row: 9, col_span: 6, row_span: 6 }
      - id: orders-table
        kind: table
        table: orders
        placement: { col: 7, row: 9, col_span: 6, row_span: 6 }
  - id: chart-line
    title: Line
    description: Single and multi-series line chart variations
    canvas: { width: 1366, height: 672 }
    grid: { columns: 12, row_height: 48, gap: 16, padding: 16 }
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: revenue-line
        kind: line_chart
        visual: revenue_line
        placement: { col: 1, row: 2, col_span: 6, row_span: 8 }
      - id: revenue-line-status
        kind: line_chart
        visual: revenue_line_status
        placement: { col: 7, row: 2, col_span: 6, row_span: 8 }
  - id: chart-area
    title: Area
    description: Single and stacked area chart variations
    canvas: { width: 1366, height: 672 }
    grid: { columns: 12, row_height: 48, gap: 16, padding: 16 }
    visuals:
