id: executive-sales
title: Executive Sales Dashboard
description: Sales, order, category, and delivery overview.
semantic_model: olist

filters:
  purchase_date:
    type: date_range
    label: Period
    dataset: orders
    dimension: purchase_timestamp
    url_param: period
    from_url_param: from
    to_url_param: to
    default:
      preset: all
    custom: true
    presets:
      - value: all
        label: All orders
      - value: recent
        label: Latest 90 days
        relative_days: 90
      - value: "2018"
        label: "2018"
        from: "2018-01-01"
        to: "2019-01-01"
      - value: "2017"
        label: "2017"
        from: "2017-01-01"
        to: "2018-01-01"
  state:
    type: multi_select
    label: State
    dataset: orders
    dimension: state
    url_param: state
    operator: in
    values:
      source: distinct
      limit: 50
  category:
    type: text
    label: Category
    dataset: orders
    dimension: category
    url_param: category
    operator_url_param: category_op
    default_operator: contains
    operators: [contains, equals, starts_with, not_contains]

kpis:
  total_orders:
    title: Orders
    dataset: orders
    measure: order_count
    note: Filtered order count
    tone: ink
  revenue:
    title: Revenue
    dataset: orders
    measure: revenue
    note: Cached payment value
    tone: green
  aov:
    title: AOV
    dataset: orders
    measure: aov
    note: Revenue per order
    tone: amber
  review:
    title: Review
    dataset: orders
    measure: review_score
    note: Average score
    tone: coral

visuals:
  revenue:
    title: Revenue by month
    type: area
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  orders:
    title: Orders by status
    type: donut
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
    interaction:
      field: status
      targets:
        visuals: [revenue, categories, delivery]
        tables: [orders]
  orders_by_month_status:
    title: Orders by month and status
    type: column
    stacked: true
    dataset: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 40
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  categories:
    title: Top product categories
    type: bar
    dataset: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 10
    interaction:
      field: category
      targets:
        visuals: [revenue, orders, delivery]
        tables: [orders]
  delivery:
    title: Delivery speed
    type: bar
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [order_count]
      sort:
        - field: delivery_bucket
          direction: asc
    interaction:
      field: delivery_bucket
      targets:
        visuals: [revenue, orders, categories]
        tables: [orders]

tables:
  orders:
    title: Orders
    dataset: orders
    default_sort:
      key: purchase_date
      direction: desc
    columns:
      - key: order_id
        label: Order
      - key: purchase_date
        label: Purchased
      - key: status
        label: Status
      - key: state
        label: State
      - key: category
        label: Category
      - key: revenue
        label: Revenue
        align: right
      - key: review_score
        label: Review
        align: right
      - key: delivery_days
        label: Delivery
        align: right

pages:
  - id: overview
    title: Overview
    description: Executive sales summary
    canvas:
      width: 1366
      height: 838
    grid:
      columns: 12
      row_height: 48
      gap: 16
      padding: 16
    visuals:
      - id: kpis
        kind: kpi_strip
        placement: { col: 1, row: 1, col_span: 12, row_span: 2 }
      - id: revenue
        kind: line_chart
        visual: revenue
        placement: { col: 1, row: 3, col_span: 6, row_span: 5 }
      - id: orders
        kind: bar_chart
        visual: orders
        placement: { col: 7, row: 3, col_span: 3, row_span: 5 }
      - id: delivery
        kind: bar_chart
        visual: delivery
        placement: { col: 10, row: 3, col_span: 3, row_span: 5 }
      - id: categories
        kind: bar_chart
        visual: categories
        placement: { col: 1, row: 8, col_span: 6, row_span: 6 }
      - id: orders-table
        kind: table
        table: orders
        placement: { col: 7, row: 8, col_span: 6, row_span: 6 }
  - id: operations
    title: Operations
    description: Fulfillment and order detail
    canvas:
      width: 1366
      height: 838
    grid:
      columns: 12
      row_height: 48
      gap: 16
      padding: 16
    visuals:
      - id: kpis
        kind: kpi_strip
        placement: { col: 1, row: 1, col_span: 12, row_span: 2 }
      - id: delivery
        kind: bar_chart
        visual: delivery
        placement: { col: 1, row: 3, col_span: 6, row_span: 5 }
      - id: orders
        kind: column_chart
        visual: orders_by_month_status
        placement: { col: 7, row: 3, col_span: 6, row_span: 5 }
      - id: orders-table
        kind: table
        table: orders
        placement: { col: 1, row: 8, col_span: 12, row_span: 6 }
