tables:
  orders:
    kind: data_table
    title: Orders
    default_sort:
      key: purchase_date
      direction: desc
    columns:
    - key: order_id
      label: Order
      width: 240
      format: text
    - key: purchase_date
      label: Purchased
      width: 126
      format: text
    - key: status
      label: Status
      width: 128
      format: text
    - key: state
      label: State
      width: 78
      format: text
    - key: category
      label: Category
      width: 210
      format: text
    - key: revenue
      label: Revenue
      align: right
      width: 130
      format: currency
    - key: review_score
      label: Review
      align: right
      width: 104
      format: decimal
    - key: delivery_days
      label: Delivery
      align: right
      width: 108
      format: days
    query:
      columns:
        order_id: orders.order_id
        purchase_date: orders.purchase_date
        status: orders.status
        state: customers.state
        category: orders.category
        revenue: orders.revenue
        review_score: orders.review_score
        delivery_days: orders.delivery_days
      table: orders
      fields:
      - orders.order_id
      - orders.purchase_date
      - orders.status
      - customers.state
      - orders.category
