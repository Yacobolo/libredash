id: executive-sales
title: Executive Sales Dashboard
description: Sales, order, category, and delivery overview.
metrics_views: [orders]

filters:
  purchase_date:
    type: date_range
    label: Period
    metrics_view: orders
    dimension: purchase_timestamp
    url_param: period
    from_url_param: from
    to_url_param: to
    default:
      preset: all
    custom: true
    presets:
      - value: all
        label: All orders
      - value: recent
        label: Latest 90 days
        relative_days: 90
      - value: "2018"
        label: "2018"
        from: "2018-01-01"
        to: "2019-01-01"
      - value: "2017"
        label: "2017"
        from: "2017-01-01"
        to: "2018-01-01"
  state:
    type: multi_select
    label: State
    metrics_view: orders
    dimension: state
    url_param: state
    operator: in
    values:
      source: distinct
      limit: 50
  category:
    type: text
    label: Category
    metrics_view: orders
    dimension: category
    url_param: category
    operator_url_param: category_op
    default_operator: contains
    operators: [contains, equals, starts_with, not_contains]

visuals:
  total_orders:
    kind: kpi
    shape: single_value
    metrics_view: orders
    query:
      measures: [order_count]
    options:
      note: Filtered order count
      tone: ink
  revenue_kpi:
    kind: kpi
    shape: single_value
    metrics_view: orders
    query:
      measures: [revenue]
    options:
      note: Cached payment value
      tone: green
  aov_kpi:
    kind: kpi
    shape: single_value
    metrics_view: orders
    query:
      measures: [aov]
    options:
      note: Revenue per order
      tone: amber
  review_kpi:
    kind: kpi
    shape: single_value
    metrics_view: orders
    query:
      measures: [review_score]
    options:
      note: Average score
      tone: coral
  revenue:
    title: Revenue by month
    type: area
    metrics_view: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  orders:
    title: Orders by status
    type: donut
    metrics_view: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
    interaction:
      field: status
      targets:
        visuals: [revenue, categories, delivery]
        tables: [orders]
  orders_by_month_status:
    title: Orders by month and status
    shape: category_series_value
    renderer: echarts
    type: column
    options:
      stacked: true
    metrics_view: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 40
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  categories:
    title: Top product categories
    type: bar
    metrics_view: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 10
    interaction:
      field: category
      targets:
        visuals: [revenue, orders, delivery]
        tables: [orders]
  delivery:
    title: Delivery speed
    type: bar
    metrics_view: orders
    query:
      dimensions: [delivery_bucket]
      measures: [order_count]
      sort:
        - field: delivery_bucket
          direction: asc
    interaction:
      field: delivery_bucket
      targets:
        visuals: [revenue, orders, categories]
        tables: [orders]
  state_status_heatmap:
    title: State by order status
    shape: matrix
    renderer: echarts
    type: heatmap
    metrics_view: orders
    query:
      dimensions: [state, status]
      measures: [order_count]
      sort:
        - field: state
          direction: asc
        - field: status
          direction: asc
      limit: 120
  status_delivery_flow:
    title: Status to delivery speed
    shape: graph
    renderer: echarts
    type: sankey
    metrics_view: orders
    query:
      dimensions: [status, delivery_bucket]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 40
  delivery_distribution:
    title: Delivery day distribution
    shape: distribution
    renderer: echarts
    type: boxplot
    metrics_view: orders
    query:
      dimensions: [delivery_bucket]
      measures: [delivery_days]
      sort:
        - field: delivery_bucket
          direction: asc
  state_order_map:
    title: Orders by state
    shape: geo
    renderer: echarts
    type: map
    options:
      map: brazil_states
    metrics_view: orders
    query:
      dimensions: [state]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 27
  status_delivery_graph:
    title: Status and delivery network
    shape: graph
    renderer: echarts
    type: graph
    metrics_view: orders
    query:
      dimensions: [status, delivery_bucket]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 40
  revenue_orders_combo:
    title: Revenue and orders by month
    shape: category_multi_measure
    renderer: echarts
    type: combo
    options:
      series_types:
        Revenue: line
        Orders: column
    metrics_view: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue, order_count]
      sort:
        - field: purchase_month
