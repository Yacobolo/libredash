id: executive-sales
title: Executive Sales Dashboard
description: Sales, order, category, and delivery overview.
filters:
  purchase_date:
    type: date_range
    label: Period
    url_param: period
    from_url_param: from
    to_url_param: to
    default:
      preset: all
    custom: true
    presets:
    - value: all
      label: All orders
    - value: recent
      label: Latest 90 days
      relative_days: 90
    - value: '2018'
      label: '2018'
      from: '2018-01-01'
      to: '2019-01-01'
    - value: '2017'
      label: '2017'
      from: '2017-01-01'
      to: '2018-01-01'
    field: orders.purchase_timestamp
  state:
    type: multi_select
    label: State
    url_param: state
    operator: in
    values:
      source: distinct
      limit: 50
    field: customers.state
  category:
    type: text
    label: Category
    url_param: category
    operator_url_param: category_op
    default_operator: contains
    operators:
    - contains
    - equals
    - starts_with
    - not_contains
    field: orders.category
visuals:
  total_orders:
    kind: kpi
    shape: single_value
    query:
      measures:
        order_count:
    options:
      note: Filtered order count
      tone: ink
  revenue_kpi:
    kind: kpi
    shape: single_value
    query:
      measures:
        revenue:
    options:
      note: Payment value
      tone: green
  aov_kpi:
    kind: kpi
    shape: single_value
    query:
      measures:
        aov:
    options:
      note: Revenue per order
      tone: amber
  review_kpi:
    kind: kpi
    shape: single_value
    query:
      measures:
        review_score:
    options:
      note: Average score
      tone: coral
  revenue:
    title: Revenue by month
    type: area
    query:
      dimensions:
        purchase_month: orders.purchase_month
      measures:
        revenue:
      sort:
      - field: purchase_month
        direction: asc
      limit: 30
    interaction:
      field: orders.purchase_month
      targets:
        visuals:
        - orders
        - categories
        - delivery
        tables:
        - orders
  orders:
    title: Orders by status
    type: donut
    query:
      dimensions:
        status: orders.status
      measures:
        order_count:
      sort:
      - field: value
        direction: desc
    interaction:
      field: orders.status
      targets:
        visuals:
        - revenue
        - categories
        - delivery
        tables:
        - orders
  orders_by_month_status:
    title: Orders by month and status
    shape: category_series_value
    renderer: echarts
    type: column
    options:
      stacked: true
    query:
      dimensions:
        purchase_month: orders.purchase_month
      series:
        field: orders.status
        alias: status
      measures:
        order_count:
      sort:
      - field: purchase_month
        direction: asc
      limit: 40
    interaction:
      field: orders.purchase_month
      targets:
        visuals:
        - orders
        - categories
        - delivery
        tables:
        - orders
  categories:
    title: Top product categories
    type: bar
    query:
      dimensions:
        category: orders.category
      measures:
        revenue:
      sort:
      - field: value
        direction: desc
      limit: 10
    interaction:
      field: orders.category
      targets:
        visuals:
        - revenue
        - orders
        - delivery
        tables:
        - orders
  delivery:
    title: Delivery speed
    type: bar
    query:
      dimensions:
        delivery_bucket: orders.delivery_bucket
      measures:
        order_count:
      sort:
      - field: delivery_bucket
        direction: asc
    interaction:
      field: orders.delivery_bucket
      targets:
        visuals:
        - revenue
        - orders
        - categories
        tables:
        - orders
  state_status_heatmap:
    title: State by order status
    shape: matrix
    renderer: echarts
    type: heatmap
    query:
      dimensions:
        state: customers.state
        status: orders.status
      measures:
        order_count:
      sort:
      - field: state
        direction: asc
      - field: status
        direction: asc
      limit: 120
  status_delivery_flow:
