tables:
  orders:
    kind: data_table
    title: Orders
    metrics_view: orders
    default_sort:
      key: purchase_date
      direction: desc
    columns:
      - key: order_id
        label: Order
      - key: purchase_date
        label: Purchased
      - key: status
        label: Status
      - key: state
        label: State
      - key: category
        label: Category
      - key: revenue
        label: Revenue
        align: right
      - key: review_score
        label: Review
        align: right
      - key: delivery_days
        label: Delivery
        align: right
  state_status_matrix:
    kind: matrix_table
    title: State status matrix
    metrics_view: orders
    rows: [state]
    columns: [status]
    measures: [order_count, revenue]
    default_sort:
      key: state
      direction: asc
  category_status_pivot:
    kind: pivot_table
    title: Category status pivot
    metrics_view: orders
    rows: [category]
    columns: [status]
    measures: [order_count]
    default_sort:
      key: category
      direction: asc

pages:
  - id: overview
    title: Overview
    description: Executive sales summary
    canvas:
      width: 1366
      height: 912
    grid:
      columns: 12
      row_height: 48
      gap: 16
      padding: 16
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: total-orders
        kind: kpi_card
        visual: total_orders
        placement: { col: 1, row: 2, col_span: 3, row_span: 2 }
      - id: revenue-kpi
        kind: kpi_card
        visual: revenue_kpi
