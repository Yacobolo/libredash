id: executive-sales
title: Executive Sales Dashboard
description: Sales, order, category, and delivery overview.
semantic_model: olist

filters:
  purchase_date:
    type: date_range
    label: Period
    dataset: orders
    dimension: purchase_timestamp
    url_param: period
    from_url_param: from
    to_url_param: to
    default:
      preset: all
    custom: true
    presets:
      - value: all
        label: All orders
      - value: recent
        label: Latest 90 days
        relative_days: 90
      - value: "2018"
        label: "2018"
        from: "2018-01-01"
        to: "2019-01-01"
      - value: "2017"
        label: "2017"
        from: "2017-01-01"
        to: "2018-01-01"
  state:
    type: multi_select
    label: State
    dataset: orders
    dimension: state
    url_param: state
    operator: in
    values:
      source: distinct
      limit: 50
  category:
    type: text
    label: Category
    dataset: orders
    dimension: category
    url_param: category
    operator_url_param: category_op
    default_operator: contains
    operators: [contains, equals, starts_with, not_contains]

kpis:
  total_orders:
    title: Orders
    dataset: orders
    measure: order_count
    note: Filtered order count
    tone: ink
  revenue:
    title: Revenue
    dataset: orders
    measure: revenue
    note: Cached payment value
    tone: green
  aov:
    title: AOV
    dataset: orders
    measure: aov
    note: Revenue per order
    tone: amber
  review:
    title: Review
    dataset: orders
    measure: review_score
    note: Average score
    tone: coral

visuals:
  revenue:
    title: Revenue by month
    type: area
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  orders:
    title: Orders by status
    type: donut
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
    interaction:
      field: status
      targets:
        visuals: [revenue, categories, delivery]
        tables: [orders]
  orders_by_month_status:
    title: Orders by month and status
    shape: category_series_value
    renderer: echarts
    type: column
    options:
      stacked: true
    dataset: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 40
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  categories:
    title: Top product categories
    type: bar
    dataset: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 10
    interaction:
      field: category
      targets:
        visuals: [revenue, orders, delivery]
        tables: [orders]
  delivery:
    title: Delivery speed
    type: bar
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [order_count]
      sort:
        - field: delivery_bucket
          direction: asc
    interaction:
      field: delivery_bucket
      targets:
        visuals: [revenue, orders, categories]
        tables: [orders]
  state_status_heatmap:
    title: State by order status
    shape: matrix
    renderer: echarts
    type: heatmap
    dataset: orders
    query:
      dimensions: [state, status]
      measures: [order_count]
      sort:
        - field: state
          direction: asc
        - field: status
          direction: asc
      limit: 120
  status_delivery_flow:
    title: Status to delivery speed
    shape: graph
    renderer: echarts
    type: sankey
    dataset: orders
    query:
      dimensions: [status, delivery_bucket]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 40
  delivery_distribution:
    title: Delivery day distribution
    shape: distribution
    renderer: echarts
    type: boxplot
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [delivery_days]
      sort:
        - field: delivery_bucket
          direction: asc
  state_order_map:
    title: Orders by state
    shape: geo
    renderer: echarts
    type: map
    options:
      map: brazil_states
    dataset: orders
    query:
      dimensions: [state]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 27
  status_delivery_graph:
    title: Status and delivery network
    shape: graph
    renderer: echarts
    type: graph
    dataset: orders
    query:
      dimensions: [status, delivery_bucket]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 40
  revenue_orders_combo:
    title: Revenue and orders by month
    shape: category_multi_measure
    renderer: echarts
    type: combo
    options:
      series_types:
        Revenue: line
        Orders: column
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue, order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
  revenue_waterfall:
    title: Monthly revenue contribution
    shape: category_delta
    renderer: echarts
    type: waterfall
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 18
  delivery_histogram:
    title: Delivery days histogram
    shape: binned_measure
    renderer: echarts
    type: histogram
    options:
      bin_count: 16
    dataset: orders
    query:
      measures: [delivery_days]
  status_radar:
    title: Order status radar
    shape: category_value
    renderer: echarts
    type: radar
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 8
  category_status_sunburst:
    title: Category and status hierarchy
    shape: hierarchy
    renderer: echarts
    type: sunburst
    dataset: orders
    query:
      dimensions: [category, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 80
  state_status_tree:
    title: State and status tree
    shape: hierarchy
    renderer: echarts
    type: tree
    dataset: orders
    query:
      dimensions: [state, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 80

tables:
  orders:
    title: Orders
    dataset: orders
    default_sort:
      key: purchase_date
      direction: desc
    columns:
      - key: order_id
        label: Order
      - key: purchase_date
        label: Purchased
      - key: status
        label: Status
      - key: state
        label: State
      - key: category
        label: Category
      - key: revenue
        label: Revenue
        align: right
      - key: review_score
        label: Review
        align: right
      - key: delivery_days
        label: Delivery
        align: right

pages:
  - id: overview
    title: Overview
    description: Executive sales summary
    canvas:
      width: 1366
      height: 912
    grid:
      columns: 12
      row_height: 48
      gap: 16
      padding: 16
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: kpis
        kind: kpi_strip
        placement: { col: 1, row: 2, col_span: 12, row_span: 2 }
      - id: revenue
        kind: line_chart
        visual: revenue
        placement: { col: 1, row: 4, col_span: 6, row_span: 5 }
      - id: orders
        kind: bar_chart
        visual: orders
        placement: { col: 7, row: 4, col_span: 3, row_span: 5 }
      - id: delivery
        kind: bar_chart
        visual: delivery
        placement: { col: 10, row: 4, col_span: 3, row_span: 5 }
      - id: categories
        kind: bar_chart
        visual: categories
        placement: { col: 1, row: 9, col_span: 6, row_span: 6 }
      - id: orders-table
        kind: table
        table: orders
        placement: { col: 7, row: 9, col_span: 6, row_span: 6 }
  - id: operations
    title: Operations
    description: Fulfillment and order detail
    canvas:
      width: 1366
      height: 1850
    grid:
      columns: 12
      row_height: 48
      gap: 16
      padding: 16
    visuals:
      - id: kpis
        kind: kpi_strip
        placement: { col: 1, row: 1, col_span: 12, row_span: 2 }
      - id: delivery
        kind: bar_chart
        visual: delivery
        placement: { col: 1, row: 3, col_span: 3, row_span: 5 }
      - id: orders
        kind: column_chart
        visual: orders_by_month_status
        placement: { col: 4, row: 3, col_span: 3, row_span: 5 }
      - id: state-status
        kind: heatmap_chart
        visual: state_status_heatmap
        placement: { col: 7, row: 3, col_span: 3, row_span: 5 }
      - id: state-map
        kind: map_chart
        visual: state_order_map
        placement: { col: 10, row: 3, col_span: 3, row_span: 5 }
      - id: status-flow
        kind: sankey_chart
        visual: status_delivery_flow
        placement: { col: 1, row: 8, col_span: 4, row_span: 5 }
      - id: status-graph
        kind: graph_chart
        visual: status_delivery_graph
        placement: { col: 5, row: 8, col_span: 4, row_span: 5 }
      - id: delivery-distribution
        kind: boxplot_chart
        visual: delivery_distribution
        placement: { col: 9, row: 8, col_span: 4, row_span: 5 }
      - id: revenue-orders-combo
        kind: combo_chart
        visual: revenue_orders_combo
        placement: { col: 1, row: 13, col_span: 6, row_span: 5 }
      - id: revenue-waterfall
        kind: waterfall_chart
        visual: revenue_waterfall
        placement: { col: 7, row: 13, col_span: 6, row_span: 5 }
      - id: delivery-histogram
        kind: histogram_chart
        visual: delivery_histogram
        placement: { col: 1, row: 18, col_span: 4, row_span: 5 }
      - id: status-radar
        kind: radar_chart
        visual: status_radar
        placement: { col: 5, row: 18, col_span: 4, row_span: 5 }
      - id: category-sunburst
        kind: sunburst_chart
        visual: category_status_sunburst
        placement: { col: 9, row: 18, col_span: 4, row_span: 5 }
      - id: state-tree
        kind: tree_chart
        visual: state_status_tree
        placement: { col: 1, row: 23, col_span: 5, row_span: 6 }
      - id: orders-table
        kind: table
        table: orders
        placement: { col: 6, row: 23, col_span: 7, row_span: 6 }
