        visual: revenue
        placement: { col: 1, row: 2, col_span: 6, row_span: 8 }
      - id: revenue-area-status
        kind: area_chart
        visual: revenue_area_status
        placement: { col: 7, row: 2, col_span: 6, row_span: 8 }
  - id: chart-bar
    title: Bar
    description: Horizontal bar chart variations
    canvas: { width: 1366, height: 1232 }
    grid: { columns: 12, row_height: 48, gap: 16, padding: 16 }
    visuals:
      - id: period-filter
        kind: filter_card
        filter: purchase_date
        placement: { col: 1, row: 1, col_span: 3, row_span: 1 }
      - id: state-filter
        kind: filter_card
        filter: state
        placement: { col: 4, row: 1, col_span: 3, row_span: 1 }
      - id: categories
        kind: bar_chart
        visual: categories
        placement: { col: 1, row: 2, col_span: 6, row_span: 8 }
      - id: delivery
        kind: bar_chart
        visual: delivery
        placement: { col: 7, row: 2, col_span: 6, row_span: 8 }
      - id: categories-by-status
