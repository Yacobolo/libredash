id: executive-sales
title: Executive Sales Dashboard
description: Sales, order, category, and delivery overview.
semantic_model: olist

filters:
  purchase_date:
    type: date_range
    label: Period
    dataset: orders
    dimension: purchase_timestamp
    url_param: period
    from_url_param: from
    to_url_param: to
    default:
      preset: all
    custom: true
    presets:
      - value: all
        label: All orders
      - value: recent
        label: Latest 90 days
        relative_days: 90
      - value: "2018"
        label: "2018"
        from: "2018-01-01"
        to: "2019-01-01"
      - value: "2017"
        label: "2017"
        from: "2017-01-01"
        to: "2018-01-01"
  state:
    type: multi_select
    label: State
    dataset: orders
    dimension: state
    url_param: state
    operator: in
    values:
      source: distinct
      limit: 50
  category:
    type: text
    label: Category
    dataset: orders
    dimension: category
    url_param: category
    operator_url_param: category_op
    default_operator: contains
    operators: [contains, equals, starts_with, not_contains]

kpis:
  total_orders:
    title: Orders
    dataset: orders
    measure: order_count
    note: Filtered order count
    tone: ink
  revenue:
    title: Revenue
    dataset: orders
    measure: revenue
    note: Cached payment value
    tone: green
  aov:
    title: AOV
    dataset: orders
    measure: aov
    note: Revenue per order
    tone: amber
  review:
    title: Review
    dataset: orders
    measure: review_score
    note: Average score
    tone: coral

visuals:
  revenue:
    title: Revenue by month
    type: area
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  orders:
    title: Orders by status
    type: donut
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
    interaction:
      field: status
      targets:
        visuals: [revenue, categories, delivery]
        tables: [orders]
  orders_by_month_status:
    title: Orders by month and status
    shape: category_series_value
    renderer: echarts
    type: column
    options:
      stacked: true
    dataset: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 40
    interaction:
      field: purchase_month
      targets:
        visuals: [orders, categories, delivery]
        tables: [orders]
  categories:
    title: Top product categories
    type: bar
    dataset: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 10
    interaction:
      field: category
      targets:
        visuals: [revenue, orders, delivery]
        tables: [orders]
  delivery:
    title: Delivery speed
    type: bar
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [order_count]
      sort:
        - field: delivery_bucket
          direction: asc
    interaction:
      field: delivery_bucket
      targets:
        visuals: [revenue, orders, categories]
        tables: [orders]
  state_status_heatmap:
    title: State by order status
    shape: matrix
    renderer: echarts
    type: heatmap
    dataset: orders
    query:
      dimensions: [state, status]
      measures: [order_count]
      sort:
        - field: state
          direction: asc
        - field: status
          direction: asc
      limit: 120
  status_delivery_flow:
    title: Status to delivery speed
    shape: graph
    renderer: echarts
    type: sankey
    dataset: orders
    query:
      dimensions: [status, delivery_bucket]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 40
  delivery_distribution:
    title: Delivery day distribution
    shape: distribution
    renderer: echarts
    type: boxplot
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [delivery_days]
      sort:
        - field: delivery_bucket
          direction: asc
  state_order_map:
    title: Orders by state
    shape: geo
    renderer: echarts
    type: map
    options:
      map: brazil_states
    dataset: orders
    query:
      dimensions: [state]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 27
  status_delivery_graph:
    title: Status and delivery network
    shape: graph
    renderer: echarts
    type: graph
    dataset: orders
    query:
      dimensions: [status, delivery_bucket]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 40
  revenue_orders_combo:
    title: Revenue and orders by month
    shape: category_multi_measure
    renderer: echarts
    type: combo
    options:
      series_types:
        Revenue: line
        Orders: column
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue, order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
  revenue_waterfall:
    title: Monthly revenue contribution
    shape: category_delta
    renderer: echarts
    type: waterfall
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 18
  delivery_histogram:
    title: Delivery days histogram
    shape: binned_measure
    renderer: echarts
    type: histogram
    options:
      bin_count: 16
    dataset: orders
    query:
      measures: [delivery_days]
  status_radar:
    title: Order status radar
    shape: category_value
    renderer: echarts
    type: radar
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 8
  category_status_sunburst:
    title: Category and status hierarchy
    shape: hierarchy
    renderer: echarts
    type: sunburst
    dataset: orders
    query:
      dimensions: [category, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 80
  state_status_tree:
    title: State and status tree
    shape: hierarchy
    renderer: echarts
    type: tree
    dataset: orders
    query:
      dimensions: [state, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 80
  revenue_line:
    title: Revenue line by month
    type: line
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
  revenue_line_status:
    title: Revenue line by status
    shape: category_series_value
    renderer: echarts
    type: line
    dataset: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 60
  revenue_area_status:
    title: Stacked revenue area
    shape: category_series_value
    renderer: echarts
    type: area
    options:
      stacked: true
    dataset: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [revenue]
      sort:
        - field: purchase_month
          direction: asc
      limit: 60
  categories_by_status_bar:
    title: Category revenue by status
    shape: category_series_value
    renderer: echarts
    type: bar
    options:
      stacked: true
    dataset: orders
    query:
      dimensions: [category]
      series: status
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 60
  orders_by_month_column:
    title: Orders by month
    type: column
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [order_count]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
  status_pie:
    title: Orders by status pie
    type: pie
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
  category_pie:
    title: Revenue by category pie
    type: pie
    dataset: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 8
  category_donut:
    title: Revenue by category donut
    type: donut
    dataset: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 8
  delivery_scatter:
    title: Delivery days scatter by month
    type: scatter
    dataset: orders
    query:
      dimensions: [purchase_month]
      measures: [delivery_days]
      sort:
        - field: purchase_month
          direction: asc
      limit: 30
  delivery_scatter_status:
    title: Delivery days scatter by status
    shape: category_series_value
    renderer: echarts
    type: scatter
    dataset: orders
    query:
      dimensions: [purchase_month]
      series: status
      measures: [delivery_days]
      sort:
        - field: purchase_month
          direction: asc
      limit: 60
  status_funnel:
    title: Orders by status funnel
    type: funnel
    dataset: orders
    query:
      dimensions: [status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
  delivery_funnel:
    title: Delivery speed funnel
    type: funnel
    dataset: orders
    query:
      dimensions: [delivery_bucket]
      measures: [order_count]
      sort:
        - field: delivery_bucket
          direction: asc
  category_treemap:
    title: Category revenue treemap
    type: treemap
    dataset: orders
    query:
      dimensions: [category]
      measures: [revenue]
      sort:
        - field: value
          direction: desc
      limit: 18
  state_treemap:
    title: State order treemap
    type: treemap
    dataset: orders
    query:
      dimensions: [state]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 18
  total_orders_gauge:
    title: Total orders gauge
    shape: single_value
    renderer: echarts
    type: gauge
    dataset: orders
    query:
      measures: [order_count]
  review_gauge:
    title: Average review gauge
    shape: single_value
    renderer: echarts
    type: gauge
    dataset: orders
    query:
      measures: [review_score]
  category_status_heatmap:
    title: Category by order status
    shape: matrix
    renderer: echarts
    type: heatmap
    dataset: orders
    query:
      dimensions: [category, status]
      measures: [order_count]
      sort:
        - field: value
          direction: desc
      limit: 120
  category_status_flow:
    title: Category to status flow
