apiVersion: libredash.dev/v1
kind: Workspace
metadata:
  name: movielens
  title: MovieLens Workspace
  description: Experimental large-scale movie ratings workspace for BI model and dashboard stress testing.
spec:
  uses:
    sources:
      - movielens.ratings
      - movielens.movies
      - movielens.tags
      - movielens.links
  models:
    include:
      - models/*.yaml
  semanticModels:
    include:
      - semantic-models/*.yaml
  dashboards:
    include:
      - dashboards/*.yaml
  access:
    include: []
  agentPolicy:
    include: []
