apiVersion: libredash.dev/v1
kind: Dashboard
metadata:
  workspace: movielens
  name: ratings-overview
  title: Ratings Overview
  description: MovieLens rating volume, rating quality, users, movies, and trend overview.
  tags: [movies, ratings, experiment]
spec:
  semanticModel: movie_ratings
  filters:
    rating_date:
      type: date_range
      label: Rating date
      url_param: period
      from_url_param: from
      to_url_param: to
      field: activity_date
      default:
        preset: all
      presets:
        - value: all
          label: All time
        - value: "2023"
          label: "2023"
          from: "2023-01-01"
          to: "2023-12-31"
        - value: "2020s"
          label: 2020s
          from: "2020-01-01"
          to: "2030-01-01"
    release_decade:
      type: multi_select
      label: Release decade
      url_param: decade
      operator: in
      values:
        source: distinct
        limit: 20
      field: release_decade
    rating_bucket:
      type: multi_select
      label: Rating
      url_param: rating
      operator: in
      values:
        source: distinct
        limit: 10
      field: ratings.rating_bucket
      fact: ratings
    title:
      type: text
      label: Title
      url_param: title
      operator_url_param: title_op
      default_operator: contains
      operators: [contains, equals, starts_with, not_contains]
      field: movie_title
  visuals:
    rating_count:
      kind: kpi
      shape: single_value
      query:
        measures:
          rating_count:
      options:
        note: Rating events
        tone: ink
    average_rating:
      kind: kpi
      shape: single_value
      query:
        measures:
          average_rating:
      options:
        note: Mean rating
        tone: amber
    active_users:
      kind: kpi
      shape: single_value
      query:
        measures:
          active_users:
      options:
        note: Distinct users
        tone: green
    rated_movies:
      kind: kpi
      shape: single_value
      query:
        measures:
          rated_movies:
      options:
        note: Distinct movies
        tone: coral
    tags_per_rating:
      kind: kpi
      shape: single_value
      query:
        measures:
          tags_per_rating:
      options:
        note: Independently aggregated tags / ratings
        tone: green
    activity_by_month:
      title: Ratings and tags by activity month
      shape: category_multi_measure
      renderer: echarts
      type: combo
      options:
        series_types:
          Ratings: column
          Tags: line
      query:
        time:
          field: activity_date
          grain: month
          alias: activity_month
        measures:
          rating_count:
          tag_count:
        sort:
          - field: label
            direction: asc
        limit: 360
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: activity_date
              grain: month
              value: label
              label: label
          targets:
            - rating_count
            - average_rating
            - active_users
            - rated_movies
            - tags_per_rating
            - tags_per_rating_by_decade
            - movie_table
    tags_per_rating_by_decade:
      title: Tags per rating by release decade
      type: bar
      query:
        dimensions:
          release_decade: release_decade
        measures:
          tags_per_rating:
        sort:
          - field: release_decade
            direction: asc
        limit: 20
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: release_decade
              value: label
              label: label
          targets:
            - rating_count
            - average_rating
            - active_users
            - rated_movies
            - tags_per_rating
            - activity_by_month
            - ratings_by_month
            - rating_distribution
            - top_movies
            - average_by_decade
            - movie_table
    ratings_by_month:
      title: Ratings by month
      type: area
      query:
        dimensions:
          rating_month: ratings.rating_month
        measures:
          rating_count:
        sort:
          - field: rating_month
            direction: asc
        limit: 360
    rating_distribution:
      title: Rating distribution
      type: bar
      query:
        dimensions:
          rating: ratings.rating_bucket
        measures:
          rating_count:
        sort:
          - field: rating
            direction: asc
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: ratings.rating_bucket
              fact: ratings
              value: label
              label: label
          targets:
            - rating_count
            - average_rating
            - active_users
            - rated_movies
            - tags_per_rating
            - activity_by_month
            - ratings_by_month
            - top_movies
            - average_by_decade
            - tags_per_rating_by_decade
            - movie_table
    top_movies:
      title: Most rated movies
      type: bar
      query:
        dimensions:
          title: movies.title
        measures:
          rating_count:
        sort:
          - field: value
            direction: desc
        limit: 15
    average_by_decade:
      title: Average rating by release decade
      type: bar
      query:
        dimensions:
          release_decade: movies.release_decade
        measures:
          average_rating:
        sort:
          - field: release_decade
            direction: asc
        limit: 20
  tables:
    movie_table:
      title: Movie ratings
      kind: data_table
      query:
        table: ratings
        fields:
          - movies.title
          - movies.release_year
          - movies.release_decade
          - ratings.rating_bucket
          - ratings.rating_month
          - ratings.rating
      default_sort:
        key: rating_month
        direction: desc
      columns:
        - key: title
          label: Title
        - key: release_year
          label: Year
        - key: release_decade
          label: Decade
        - key: rating_bucket
          label: Rating
        - key: rating_month
          label: Rated month
        - key: rating
          label: Rating value
          align: right
  pages:
    - name: overview
      title: Overview
      canvas:
        width: 1366
        height: 1420
      grid:
        columns: 12
        row_height: 48
        gap: 16
        padding: 16
      visuals:
        - id: rating-date-filter
          kind: filter_card
          filter: rating_date
          placement: {col: 1, row: 1, col_span: 3, row_span: 2}
        - id: decade-filter
          kind: filter_card
          filter: release_decade
          placement: {col: 4, row: 1, col_span: 3, row_span: 2}
        - id: rating-filter
          kind: filter_card
          filter: rating_bucket
          placement: {col: 7, row: 1, col_span: 3, row_span: 2}
        - id: title-filter
          kind: filter_card
          filter: title
          placement: {col: 10, row: 1, col_span: 3, row_span: 2}
        - id: rating-count
          kind: kpi_card
          visual: rating_count
          placement: {col: 1, row: 4, col_span: 3, row_span: 3}
        - id: average-rating
          kind: kpi_card
          visual: average_rating
          placement: {col: 4, row: 4, col_span: 3, row_span: 3}
        - id: active-users
          kind: kpi_card
          visual: active_users
          placement: {col: 7, row: 4, col_span: 3, row_span: 3}
        - id: rated-movies
          kind: kpi_card
          visual: rated_movies
          placement: {col: 10, row: 4, col_span: 3, row_span: 3}
        - id: ratings-trend
          kind: area_chart
          visual: ratings_by_month
          placement: {col: 1, row: 8, col_span: 8, row_span: 6}
        - id: rating-distribution
          kind: bar_chart
          visual: rating_distribution
          placement: {col: 9, row: 8, col_span: 4, row_span: 6}
        - id: top-movies
          kind: bar_chart
          visual: top_movies
          placement: {col: 1, row: 15, col_span: 6, row_span: 7}
        - id: decade-average
          kind: bar_chart
          visual: average_by_decade
          placement: {col: 7, row: 15, col_span: 6, row_span: 7}
        - id: movie-table
          kind: table
          table: movie_table
          placement: {col: 1, row: 23, col_span: 12, row_span: 8}
        - id: tags-per-rating
          kind: kpi_card
          visual: tags_per_rating
          placement: {col: 1, row: 32, col_span: 3, row_span: 3}
        - id: activity-by-month
          kind: bar_chart
          visual: activity_by_month
          placement: {col: 4, row: 32, col_span: 9, row_span: 7}
        - id: tags-per-rating-by-decade
          kind: bar_chart
          visual: tags_per_rating_by_decade
          placement: {col: 1, row: 40, col_span: 12, row_span: 7}
