apiVersion: leapview.dev/v1
kind: Dashboard
metadata:
  workspace: movielens
  name: ratings-overview
  title: Ratings Overview
  description: MovieLens rating volume, rating quality, users, movies, and trend overview.
  tags: [movies, ratings, experiment]
spec:
  semanticModel: movie_ratings
  filters:
    rating_date:
      label: Rating date
      field: activity_date
      predicates:
        - kind: range
        - kind: relative_period
    release_decade:
      label: Release decade
      field: release_decade
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: distinct
        limit: 20
    rating_bucket:
      label: Rating
      field: rating_bucket
      fact: ratings
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: distinct
        limit: 10
    title:
      label: Title
      field: movie_title
      predicates:
        - kind: comparison
          operators: [contains, equals, starts_with, not_contains]
  filter_bindings:
    rating_date:
      filter: rating_date
      default: {kind: unfiltered}
      url: {param: period, encoding: typed_v1}
      pane: {visible: true, order: 10}
    release_decade:
      filter: release_decade
      default: {kind: unfiltered}
      selection: {mode: multiple, max_selected_values: 20}
      url: {param: decade, encoding: typed_v1}
      pane: {visible: true, order: 20}
    rating_bucket:
      filter: rating_bucket
      default: {kind: unfiltered}
      selection: {mode: multiple, max_selected_values: 10}
      url: {param: rating, encoding: typed_v1}
      pane: {visible: true, order: 30}
    title:
      filter: title
      default: {kind: unfiltered}
      url: {param: title, encoding: typed_v1}
      pane: {visible: true, order: 40}
  filter_application: {mode: immediate}
  visuals:
    rating_count:
      type: kpi
      query:
        measures:
          rating_count:
      presentation:
        note: Rating events
        tone: ink
    average_rating:
      type: kpi
      query:
        measures:
          average_rating:
      presentation:
        note: Mean rating
        tone: warning
    active_users:
      type: kpi
      query:
        measures:
          active_users:
      presentation:
        note: Distinct users
        tone: success
    rated_movies:
      type: kpi
      query:
        measures:
          rated_movies:
      presentation:
        note: Distinct movies
        tone: danger
    tags_per_rating:
      type: kpi
      query:
        measures:
          tags_per_rating:
      presentation:
        note: Independently aggregated tags / ratings
        tone: success
    activity_by_month:
      title: Ratings and tags by activity month
      type: combo
      presentation:
        series_types:
          Ratings: column
          Tags: line
      query:
        time:
          field: activity_date
          grain: month
          alias: activity_month
        measures:
          rating_count:
          tag_count:
        sort:
          - field: label
            direction: asc
        limit: 360
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: activity_date
              grain: month
              value: label
              label: label
          targets:
            - rating_count
            - average_rating
            - active_users
            - rated_movies
            - tags_per_rating
            - tags_per_rating_by_decade
            - movie_table
    tags_per_rating_by_decade:
      title: Tags per rating by release decade
      type: bar
      query:
        dimensions:
          release_decade: release_decade
        measures:
          tags_per_rating:
        sort:
          - field: release_decade
            direction: asc
        limit: 20
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: release_decade
              value: label
              label: label
          targets:
            - rating_count
            - average_rating
            - active_users
            - rated_movies
            - tags_per_rating
            - activity_by_month
            - ratings_by_month
            - rating_distribution
            - top_movies
            - average_by_decade
            - movie_table
    ratings_by_month:
      title: Ratings by month
      type: area
      query:
        dimensions:
          rating_month: ratings.rating_month
        measures:
          rating_count:
        sort:
          - field: rating_month
            direction: asc
        limit: 360
    rating_distribution:
      title: Rating distribution
      type: bar
      query:
        dimensions:
          rating: ratings.rating_bucket
        measures:
          rating_count:
        sort:
          - field: rating
            direction: asc
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: ratings.rating_bucket
              fact: ratings
              value: label
              label: label
          targets:
            - rating_count
            - average_rating
            - active_users
            - rated_movies
            - tags_per_rating
            - activity_by_month
            - ratings_by_month
            - top_movies
            - average_by_decade
            - tags_per_rating_by_decade
            - movie_table
    top_movies:
      title: Most rated movies
      type: bar
      query:
        dimensions:
          title: movies.title
        measures:
          rating_count:
        sort:
          - field: value
            direction: desc
        limit: 15
    average_by_decade:
      title: Average rating by release decade
      type: bar
      query:
        dimensions:
          release_decade: movies.release_decade
        measures:
          average_rating:
        sort:
          - field: release_decade
            direction: asc
        limit: 20
    movie_table:
      title: Movie ratings
      type: table
      query:
        table: ratings
        fields:
          - movies.title
          - movies.release_year
          - movies.release_decade
          - ratings.rating_bucket
          - ratings.rating_month
          - ratings.rating
      default_sort:
        key: rating_month
        direction: desc
      columns:
        - key: title
          label: Title
        - key: release_year
          label: Year
        - key: release_decade
          label: Decade
        - key: rating_bucket
          label: Rating
        - key: rating_month
          label: Rated month
        - key: rating
          label: Rating value
          align: right
  pages:
    - id: overview
      title: Overview
      canvas:
        width: 1366
        height: 1420
      grid:
        columns: 12
        row_height: 48
        gap: 16
        padding: 16
      components:
        - id: rating-date-filter
          kind: slicer
          binding: {scope: report, id: rating_date}
          presentation: {style: date_range}
          placement: {col: 1, row: 1, col_span: 3, row_span: 2}
        - id: decade-filter
          kind: slicer
          binding: {scope: report, id: release_decade}
          presentation: {style: dropdown, search: true}
          placement: {col: 4, row: 1, col_span: 3, row_span: 2}
        - id: rating-filter
          kind: slicer
          binding: {scope: report, id: rating_bucket}
          presentation: {style: dropdown}
          placement: {col: 7, row: 1, col_span: 3, row_span: 2}
        - id: title-filter
          kind: slicer
          binding: {scope: report, id: title}
          presentation: {style: input}
          placement: {col: 10, row: 1, col_span: 3, row_span: 2}
        - id: rating-count
          kind: visual
          visual: rating_count
          placement: {col: 1, row: 4, col_span: 3, row_span: 3}
        - id: average-rating
          kind: visual
          visual: average_rating
          placement: {col: 4, row: 4, col_span: 3, row_span: 3}
        - id: active-users
          kind: visual
          visual: active_users
          placement: {col: 7, row: 4, col_span: 3, row_span: 3}
        - id: rated-movies
          kind: visual
          visual: rated_movies
          placement: {col: 10, row: 4, col_span: 3, row_span: 3}
        - id: ratings-trend
          kind: visual
          visual: ratings_by_month
          placement: {col: 1, row: 8, col_span: 8, row_span: 6}
        - id: rating-distribution
          kind: visual
          visual: rating_distribution
          placement: {col: 9, row: 8, col_span: 4, row_span: 6}
        - id: top-movies
          kind: visual
          visual: top_movies
          placement: {col: 1, row: 15, col_span: 6, row_span: 7}
        - id: decade-average
          kind: visual
          visual: average_by_decade
          placement: {col: 7, row: 15, col_span: 6, row_span: 7}
        - id: movie-table
          kind: visual
          visual: movie_table
          placement: {col: 1, row: 23, col_span: 12, row_span: 8}
        - id: tags-per-rating
          kind: visual
          visual: tags_per_rating
          placement: {col: 1, row: 32, col_span: 3, row_span: 3}
        - id: activity-by-month
          kind: visual
          visual: activity_by_month
          placement: {col: 4, row: 32, col_span: 9, row_span: 7}
        - id: tags-per-rating-by-decade
          kind: visual
          visual: tags_per_rating_by_decade
          placement: {col: 1, row: 40, col_span: 12, row_span: 7}
