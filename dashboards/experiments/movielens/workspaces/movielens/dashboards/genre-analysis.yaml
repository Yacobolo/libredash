apiVersion: leapview.dev/v1
kind: Dashboard
metadata:
  workspace: movielens
  name: genre-analysis
  title: Genre Analysis
  description: Genre-level rating volume, rating quality, trends, and release-decade comparisons.
  tags: [movies, genres, ratings, experiment]
spec:
  semanticModel: genre_ratings
  filters:
    rating_date:
      label: Rating date
      field: rating_date
      predicates:
        - kind: range
        - kind: relative_period
    genre:
      label: Genre
      field: genre
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: distinct
        limit: 30
    release_decade:
      label: Release decade
      field: release_decade
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: distinct
        limit: 20
  filter_bindings:
    rating_date:
      filter: rating_date
      default: {kind: unfiltered}
      url: {param: period, encoding: typed_v1}
      pane: {visible: true, order: 10}
    genre:
      filter: genre
      default: {kind: unfiltered}
      selection: {mode: multiple, max_selected_values: 30}
      url: {param: genre, encoding: typed_v1}
      pane: {visible: true, order: 20}
    release_decade:
      filter: release_decade
      default: {kind: unfiltered}
      selection: {mode: multiple, max_selected_values: 20}
      url: {param: decade, encoding: typed_v1}
      pane: {visible: true, order: 30}
  filter_application: {mode: immediate}
  visuals:
    genre_rating_count:
      type: kpi
      query:
        measures:
          genre_rating_count:
      presentation:
        note: Rating-genre rows
        tone: ink
    average_rating:
      type: kpi
      query:
        measures:
          average_rating:
      presentation:
        note: Mean rating
        tone: warning
    active_users:
      type: kpi
      query:
        measures:
          active_users:
      presentation:
        note: Distinct users
        tone: success
    rated_movies:
      type: kpi
      query:
        measures:
          rated_movies:
      presentation:
        note: Distinct movies
        tone: danger
    ratings_by_genre:
      title: Ratings by genre
      type: bar
      query:
        dimensions:
          genre: rating_genres.genre
        measures:
          genre_rating_count:
        sort:
          - field: value
            direction: desc
        limit: 20
    average_by_genre:
      title: Average rating by genre
      type: bar
      query:
        dimensions:
          genre: rating_genres.genre
        measures:
          average_rating:
        sort:
          - field: value
            direction: desc
        limit: 20
    genre_trend:
      title: Genre ratings by year
      type: column
      presentation:
        stacked: true
      query:
        dimensions:
          rating_year: rating_genres.rating_year
        series:
          field: rating_genres.genre
          alias: genre
        measures:
          genre_rating_count:
        sort:
          - field: rating_year
            direction: asc
        limit: 120
    decade_genres:
      title: Release decade by genre
      type: heatmap
      query:
        dimensions:
          decade: rating_genres.release_decade
          genre: rating_genres.genre
        measures:
          average_rating:
        sort:
          - field: decade
            direction: asc
          - field: genre
            direction: asc
        limit: 240
  pages:
    - id: overview
      title: Overview
      canvas:
        width: 1366
        height: 920
      grid:
        columns: 12
        row_height: 48
        gap: 16
        padding: 16
      components:
        - id: rating-date-filter
          kind: slicer
          binding: {scope: report, id: rating_date}
          presentation: {style: date_range}
          placement: {col: 1, row: 1, col_span: 4, row_span: 2}
        - id: genre-filter
          kind: slicer
          binding: {scope: report, id: genre}
          presentation: {style: dropdown, search: true}
          placement: {col: 5, row: 1, col_span: 4, row_span: 2}
        - id: decade-filter
          kind: slicer
          binding: {scope: report, id: release_decade}
          presentation: {style: dropdown, search: true}
          placement: {col: 9, row: 1, col_span: 4, row_span: 2}
        - id: genre-ratings
          kind: visual
          visual: genre_rating_count
          placement: {col: 1, row: 4, col_span: 3, row_span: 3}
        - id: average-rating
          kind: visual
          visual: average_rating
          placement: {col: 4, row: 4, col_span: 3, row_span: 3}
        - id: active-users
          kind: visual
          visual: active_users
          placement: {col: 7, row: 4, col_span: 3, row_span: 3}
        - id: rated-movies
          kind: visual
          visual: rated_movies
          placement: {col: 10, row: 4, col_span: 3, row_span: 3}
        - id: ratings-by-genre
          kind: visual
          visual: ratings_by_genre
          placement: {col: 1, row: 8, col_span: 6, row_span: 7}
        - id: average-by-genre
          kind: visual
          visual: average_by_genre
          placement: {col: 7, row: 8, col_span: 6, row_span: 7}
        - id: genre-trend
          kind: visual
          visual: genre_trend
          placement: {col: 1, row: 16, col_span: 6, row_span: 7}
        - id: decade-genres
          kind: visual
          visual: decade_genres
          placement: {col: 7, row: 16, col_span: 6, row_span: 7}
