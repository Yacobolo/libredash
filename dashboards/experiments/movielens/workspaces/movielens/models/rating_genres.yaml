apiVersion: leapview.dev/v1
kind: ModelTable
metadata:
  workspace: movielens
  name: rating_genres
  title: Rating Genres Fact
  description: Rating-by-genre bridge fact used to analyze genres without unsafe many-to-many joins.
spec:
  primaryKey: rating_genre_id
  grain: rating_genre_id
  fields:
    rating_genre_id: {label: Rating genre ID, description: Stable rating and genre identifier.}
    rating_id: {label: Rating ID, description: Rating-grain identifier.}
    user_id: {label: User ID, description: Anonymized MovieLens user identifier.}
    movie_id: {label: Movie ID, description: MovieLens movie identifier.}
    title: {label: Title, description: Movie title.}
    genre: {label: Genre, description: Single genre assigned to the rated movie.}
    rating: {label: Rating, description: Rating value on the MovieLens scale.}
    rating_bucket: {label: Rating bucket, description: Rounded rating bucket for distribution charts.}
    rated_at: {label: Rated at, description: Timestamp when the rating was applied.}
    rating_date: {label: Rating date, description: Date when the rating was applied.}
    rating_month: {label: Rating month, description: Calendar month when the rating was applied.}
    rating_year: {label: Rating year, description: Calendar year when the rating was applied.}
    release_year: {label: Release year, description: Movie release year.}
    release_decade: {label: Release decade, description: Movie release decade.}
  transform:
    sql: |
      WITH genre_rows AS (
        SELECT 'Action' AS genre UNION ALL
        SELECT 'Adventure' UNION ALL
        SELECT 'Animation' UNION ALL
        SELECT 'Children''s' UNION ALL
        SELECT 'Comedy' UNION ALL
        SELECT 'Crime' UNION ALL
        SELECT 'Documentary' UNION ALL
        SELECT 'Drama' UNION ALL
        SELECT 'Fantasy' UNION ALL
        SELECT 'Film-Noir' UNION ALL
        SELECT 'Horror' UNION ALL
        SELECT 'Musical' UNION ALL
        SELECT 'Mystery' UNION ALL
        SELECT 'Romance' UNION ALL
        SELECT 'Sci-Fi' UNION ALL
        SELECT 'Thriller' UNION ALL
        SELECT 'War' UNION ALL
        SELECT 'Western'
      )
      SELECT
        concat(r.rating_id, '-', genre.genre) AS rating_genre_id,
        r.rating_id,
        r.user_id,
        r.movie_id,
        m.title,
        genre.genre,
        r.rating,
        r.rating_bucket,
        r.rated_at,
        r.rating_date,
        r.rating_month,
        r.rating_year,
        m.release_year,
        m.release_decade
      FROM model.ratings r
      JOIN model.movies m ON m.movie_id = r.movie_id
      JOIN genre_rows genre ON list_contains(str_split(m.genres, '|'), genre.genre)
