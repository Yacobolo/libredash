apiVersion: libredash.dev/v1
kind: Source
metadata:
  name: movielens.movies
  title: Movies
spec:
  connection: movielens
  path: movies.csv
  fields:
    movieId: {type: integer, description: MovieLens movie identifier.}
    title: {type: string, description: Movie title with release year suffix when available.}
    genres: {type: string, description: Pipe-separated genre list.}
