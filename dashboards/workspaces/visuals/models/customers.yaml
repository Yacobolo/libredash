apiVersion: libredash.dev/v1
kind: ModelTable
metadata:
  workspace: visuals
  name: customers
  title: Visual Customers
  description: Customer model table with stable BI-facing customer fields.
spec:
  description: Customer model table with stable BI-facing customer fields.
  primaryKey: customer_id
  sources:
  - olist.customers
  fields:
    customer_id:
      label: Customer ID
      description: Stable customer identifier from the Olist customers dataset.
      type: string
    state:
      label: State
      description: Brazilian state for the customer.
      type: string
    zip_prefix:
      label: ZIP prefix
      description: Stable five-digit Brazilian ZIP-code prefix used for map aggregation and selection.
      type: string
    city:
      label: City
      description: Customer city supplied by Olist.
      type: string
    latitude:
      label: Latitude
      description: Canonical latitude joined from the Olist ZIP geolocation dataset.
      type: number
    longitude:
      label: Longitude
      description: Canonical longitude joined from the Olist ZIP geolocation dataset.
      type: number
  transform:
    sql: |
      SELECT
        c.customer_id,
        printf('%05d', try_cast(c.customer_zip_code_prefix AS INTEGER)) AS zip_prefix,
        lower(trim(c.customer_city)) AS city,
        upper(trim(c.customer_state)) AS state,
        g.latitude,
        g.longitude
      FROM source."olist.customers" c
      LEFT JOIN model.zip_geolocations g
        ON g.zip_prefix = printf('%05d', try_cast(c.customer_zip_code_prefix AS INTEGER))
