apiVersion: leapview.dev/v1
kind: ModelTable
metadata:
  workspace: visuals
  name: zip_geolocations
  title: Canonical Brazilian ZIP Locations
  description: Robust centroids derived from Olist geolocation observations after rejecting coordinates outside Brazil.
spec:
  description: One deterministic median coordinate per five-digit Brazilian ZIP-code prefix.
  primaryKey: zip_prefix
  sources:
  - olist.geolocation
  fields:
    zip_prefix:
      label: ZIP prefix
      description: Stable five-digit Brazilian ZIP-code prefix.
      type: string
    city:
      label: City
      description: Deterministic city label associated with the ZIP prefix.
      type: string
    state:
      label: State
      description: Brazilian state abbreviation associated with the ZIP prefix.
      type: string
    latitude:
      label: Latitude
      description: Median latitude across valid observations for the ZIP prefix.
      type: number
    longitude:
      label: Longitude
      description: Median longitude across valid observations for the ZIP prefix.
      type: number
  transform:
    sql: |
      WITH normalized AS (
        SELECT
          printf('%05d', try_cast(geolocation_zip_code_prefix AS INTEGER)) AS zip_prefix,
          lower(trim(geolocation_city)) AS city,
          upper(trim(geolocation_state)) AS state,
          try_cast(geolocation_lat AS DOUBLE) AS latitude,
          try_cast(geolocation_lng AS DOUBLE) AS longitude
        FROM source."olist.geolocation"
      )
      SELECT
        zip_prefix,
        min(city) AS city,
        mode(state) AS state,
        median(CASE WHEN latitude BETWEEN -34 AND 6 AND longitude BETWEEN -74 AND -34 THEN latitude END) AS latitude,
        median(CASE WHEN latitude BETWEEN -34 AND 6 AND longitude BETWEEN -74 AND -34 THEN longitude END) AS longitude
      FROM normalized
      GROUP BY zip_prefix
