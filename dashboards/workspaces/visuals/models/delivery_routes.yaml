apiVersion: leapview.dev/v1
kind: ModelTable
metadata:
  workspace: visuals
  name: delivery_routes
  title: Seller-to-Customer Delivery Routes
  description: Aggregated real Olist delivery corridors represented as ordered origin and destination vertices.
spec:
  description: Two vertices per actual order-seller delivery with seller-allocated revenue.
  primaryKey: vertex_id
  sources:
  - olist.order_items
  - olist.sellers
  fields:
    vertex_id: {label: Route vertex, description: Stable route and point-order identity, type: string}
    route_id: {label: Route, description: Stable order and seller delivery identity, type: string}
    order_id: {label: Order ID, description: Order identity used to join governed order filters, type: string}
    point_order: {label: Point order, description: Zero for seller origin and one for customer destination, type: string}
    latitude: {label: Latitude, description: Latitude of the ordered route vertex, type: number}
    longitude: {label: Longitude, description: Longitude of the ordered route vertex, type: number}
    route_label: {label: Route, description: Human-readable origin to destination route label, type: string}
    destination_state: {label: Destination state, description: Customer destination state used by dashboard filters, type: string}
    route_revenue: {label: Route revenue, description: Order revenue allocated evenly across participating sellers, type: number}
  transform:
    sql: |
      WITH order_sellers AS (
        SELECT DISTINCT order_id, seller_id
        FROM source."olist.order_items"
      ),
      allocated AS (
        SELECT
          os.order_id,
          os.seller_id,
          count(*) OVER (PARTITION BY os.order_id) AS seller_count
        FROM order_sellers os
      ),
      located AS (
        SELECT
          o.order_id,
          a.seller_id,
          printf('%05d', try_cast(s.seller_zip_code_prefix AS INTEGER)) AS seller_zip,
          coalesce(sg.city, lower(trim(s.seller_city))) AS seller_city,
          sg.latitude AS seller_latitude,
          sg.longitude AS seller_longitude,
          c.zip_prefix AS customer_zip,
          c.city AS customer_city,
          c.state AS destination_state,
          c.latitude AS customer_latitude,
          c.longitude AS customer_longitude,
          o.revenue / nullif(a.seller_count, 0) AS allocated_revenue
        FROM allocated a
        JOIN model.orders o ON o.order_id = a.order_id
        JOIN model.customers c ON c.customer_id = o.customer_id
        JOIN source."olist.sellers" s ON s.seller_id = a.seller_id
        LEFT JOIN model.zip_geolocations sg
          ON sg.zip_prefix = printf('%05d', try_cast(s.seller_zip_code_prefix AS INTEGER))
        WHERE sg.latitude IS NOT NULL
          AND sg.longitude IS NOT NULL
          AND c.latitude IS NOT NULL
          AND c.longitude IS NOT NULL
      ),
      vertices AS (
        SELECT
          order_id || ':' || seller_id || ':0' AS vertex_id,
          order_id || ':' || seller_id AS route_id,
          order_id,
          '0' AS point_order,
          seller_latitude AS latitude,
          seller_longitude AS longitude,
          seller_city || ' → ' || customer_city AS route_label,
          destination_state,
          round(allocated_revenue, 2) AS route_revenue
        FROM located
        UNION ALL
        SELECT
          order_id || ':' || seller_id || ':1' AS vertex_id,
          order_id || ':' || seller_id AS route_id,
          order_id,
          '1' AS point_order,
          customer_latitude AS latitude,
          customer_longitude AS longitude,
          seller_city || ' → ' || customer_city AS route_label,
          destination_state,
          round(allocated_revenue, 2) AS route_revenue
        FROM located
      )
      SELECT * FROM vertices
