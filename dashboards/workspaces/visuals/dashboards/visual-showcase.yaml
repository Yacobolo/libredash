apiVersion: leapview.dev/v1
kind: Dashboard
metadata:
  workspace: visuals
  name: visual-showcase
  title: Visual Showcase
  description: Sales, order, category, and delivery overview.
  tags:
    - dev
    - visuals
    - qa
spec:
  semanticModel: visuals
  filters:
    purchase_date:
      label: Purchase date
      description: Filters dashboard content by the calendar purchase date.
      field: purchase_date
      predicates:
        - kind: range
    purchase_time:
      label: Relative purchase period
      description: Filters dashboard content using a timestamp-relative period.
      field: purchase_timestamp
      predicates:
        - kind: relative_period
    state:
      label: State
      description: Filters dashboard content by customer state.
      field: state
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: distinct
        limit: 50
    order_status:
      label: Order status
      description: Filters dashboard content by one or more lifecycle states.
      field: order_status
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: distinct
        limit: 20
    category_text:
      label: Category text
      description: Filters dashboard content with typed string comparisons.
      field: category
      predicates:
        - kind: comparison
          operators: [contains, equals, starts_with, ends_with, not_contains, not_equals]
    delivered:
      label: Delivery state
      description: Filters dashboard content by the typed delivered boolean.
      field: delivered
      predicates:
        - kind: set
          operators: [in, not_in]
      options:
        kind: static
        values:
          - value: {kind: boolean, value: true}
            label: Delivered
          - value: {kind: boolean, value: false}
            label: Not delivered
    delivery_days:
      label: Delivery days
      description: Filters dashboard content by an integer delivery-day range.
      field: delivery_days
      predicates:
        - kind: range
    revenue_amount:
      label: Order revenue
      description: Filters dashboard content by a decimal order-revenue range.
      field: revenue_amount
      predicates:
        - kind: range
  filter_bindings:
    purchase_date:
      filter: purchase_date
      default: {kind: unfiltered}
      url: {param: period, encoding: typed_v1}
      pane: {visible: true, order: 10}
    state:
      filter: state
      default: {kind: unfiltered}
      selection: {mode: multiple, max_selected_values: 50}
      url: {param: state, encoding: typed_v1}
      pane: {visible: true, order: 20}
  filter_application: {mode: immediate}
  visuals:
    total_orders:
      type: kpi
      description: Shows the filtered count of distinct orders.
      query:
        measures:
          order_count: null
      presentation:
        note: Filtered order count
        tone: ink
    revenue_kpi:
      type: kpi
      description: Shows filtered total payment revenue.
      query:
        measures:
          revenue: null
      presentation:
        note: Payment value
        tone: success
    aov_kpi:
      type: kpi
      description: Shows average order value for the current filters.
      query:
        measures:
          aov: null
      presentation:
        note: Revenue per order
        tone: warning
    review_kpi:
      type: kpi
      description: Shows average review score for the current filters.
      query:
        measures:
          review_score: null
      presentation:
        note: Average score
        tone: danger
    revenue:
      title: Revenue by month
      description: Tracks monthly revenue over the selected period.
      type: area
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: orders.purchase_month
              fact: orders
              value: label
              label: label
          targets:
            - orders
            - categories
            - delivery
            - orders_table
    orders:
      title: Orders by status
      description: Breaks down orders by lifecycle status.
      type: donut
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: orders.status
              fact: orders
              value: label
              label: label
          targets:
            - revenue
            - categories
            - delivery
            - orders_table
    orders_by_month_status:
      title: Orders by month and status
      description: Compares monthly order volume split by status.
      type: column
      presentation:
        stacked: true
      query:
        dimensions:
          purchase_month: orders.purchase_month
        series:
          field: orders.status
          alias: status
        measures:
          order_count: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 40
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: orders.purchase_month
              fact: orders
              value: label
              label: label
          targets:
            - orders
            - categories
            - delivery
            - orders_table
    categories:
      title: Top product categories
      description: Ranks product categories by revenue.
      type: bar
      query:
        dimensions:
          category: orders.category
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 10
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: orders.category
              fact: orders
              value: label
              label: label
          targets:
            - revenue
            - orders
            - delivery
            - orders_table
    delivery:
      title: Delivery speed
      description: Compares order volume across delivery-speed buckets.
      type: bar
      query:
        dimensions:
          delivery_bucket: orders.delivery_bucket
        measures:
          order_count: null
        sort:
          - field: delivery_bucket
            direction: asc
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: orders.delivery_bucket
              fact: orders
              value: label
              label: label
          targets:
            - revenue
            - orders
            - categories
            - orders_table
    state_status_heatmap:
      title: State by order status
      description: Shows order status concentration by customer state.
      type: heatmap
      query:
        dimensions:
          state: customers.state
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: state
            direction: asc
          - field: status
            direction: asc
        limit: 120
    status_delivery_flow:
      title: Status to delivery speed
      description: Shows flow from order status to delivery-speed bucket.
      type: sankey
      query:
        dimensions:
          status: orders.status
          delivery_bucket: orders.delivery_bucket
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 40
    delivery_distribution:
      title: Delivery day distribution
      description: Summarizes delivery-day distribution by speed bucket.
      type: boxplot
      query:
        table: orders
        dimensions:
          delivery_bucket: orders.delivery_bucket
        measures:
          delivery_days: null
        sort:
          - field: delivery_bucket
            direction: asc
    state_order_map:
      title: Orders by state
      description: Maps order count by customer state.
      type: map
      presentation: {}
      query:
        dimensions:
          state: customers.state
        measures:
          order_count: null
        sort:
          - field: order_count
            direction: desc
        limit: 27
      geo:
        theme: light
        label_density: normal
        controls:
          zoom: true
          reset: true
          compass: true
        layers:
          - id: states
            kind: choropleth
            geometry_asset: brazil_states
            join: state
            value: order_count
            tooltip: [state, order_count]
            color:
              kind: sequential
              palette: teal
              null_color: "#d8dee4"
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: customers.state
              fact: orders
              value: state
              label: state
          targets:
            - customer_point_map
            - customer_revenue_heat_map
            - customer_density_map
    status_delivery_graph:
      title: Status and delivery network
      description: Shows status and delivery-speed relationships as a network.
      type: graph
      query:
        dimensions:
          status: orders.status
          delivery_bucket: orders.delivery_bucket
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 40
    revenue_orders_combo:
      title: Revenue and orders by month
      description: Compares monthly revenue and order volume together.
      type: combo
      presentation:
        series_types:
          Revenue: line
          Orders: column
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
          order_count: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
    revenue_waterfall:
      title: Monthly revenue contribution
      description: Shows each month contribution to total revenue.
      type: waterfall
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 18
    delivery_histogram:
      title: Delivery days histogram
      description: Buckets order volume by delivery duration.
      type: histogram
      presentation:
        histogram_bins: 16
      query:
        table: orders
        measures:
          delivery_days: null
    status_radar:
      title: Order status radar
      description: Compares order status counts on a radar chart.
      type: radar
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 8
    category_status_sunburst:
      title: Category and status hierarchy
      description: Shows category and status hierarchy by order count.
      type: sunburst
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 80
    state_status_tree:
      title: State and status tree
      description: Shows customer state and order status as a hierarchy.
      type: tree
      query:
        dimensions:
          state: customers.state
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 80
    revenue_line:
      title: Revenue line by month
      type: line
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
    revenue_line_status:
      title: Revenue line by status
      type: line
      query:
        dimensions:
          purchase_month: orders.purchase_month
        series:
          field: orders.status
          alias: status
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 60
    revenue_line_step:
      title: Stepped revenue line
      type: line
      presentation:
        step: true
        show_symbols: false
        data_zoom: true
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
    revenue_area_status:
      title: Stacked revenue area
      type: area
      presentation:
        stacked: true
      query:
        dimensions:
          purchase_month: orders.purchase_month
        series:
          field: orders.status
          alias: status
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 60
    revenue_area_smooth:
      title: Smooth revenue area
      type: area
      presentation:
        smooth: true
        show_symbols: false
        data_zoom: true
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
    categories_by_status_bar:
      title: Category revenue by status
      type: bar
      presentation:
        stacked: true
      query:
        dimensions:
          category: orders.category
        series:
          field: orders.status
          alias: status
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 60
    orders_by_month_column:
      title: Orders by month
      type: column
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          order_count: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
    orders_by_month_status_grouped:
      title: Orders by month and status grouped
      type: column
      presentation:
        legend: bottom
      query:
        dimensions:
          purchase_month: orders.purchase_month
        series:
          field: orders.status
          alias: status
        measures:
          order_count: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 60
    status_pie:
      title: Orders by status pie
      type: pie
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
    category_pie:
      title: Revenue by category pie
      type: pie
      query:
        dimensions:
          category: orders.category
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 8
    status_pie_rose:
      title: Orders by status rose pie
      type: pie
      presentation:
        show_labels: true
        rose: true
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
    category_pie_inside:
      title: Compact category pie
      type: pie
      presentation:
        show_labels: true
        label_position: inside
      query:
        dimensions:
          category: orders.category
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 6
    category_donut:
      title: Revenue by category donut
      type: donut
      query:
        dimensions:
          category: orders.category
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 8
    orders_donut_center:
      title: Orders donut with center label
      type: donut
      presentation:
        center_label: Orders
        inner_radius: 0.54
        outer_radius: 0.76
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
    delivery_scatter:
      title: Delivery days scatter by month
      type: scatter
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          delivery_days: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 30
    delivery_scatter_status:
      title: Delivery days scatter by status
      type: scatter
      query:
        dimensions:
          purchase_month: orders.purchase_month
        series:
          field: orders.status
          alias: status
        measures:
          delivery_days: null
        sort:
          - field: purchase_month
            direction: asc
        limit: 60
    delivery_scatter_labeled:
      title: Labeled delivery scatter
      type: scatter
      presentation:
        show_labels: true
        label_position: top
        symbol_size: 12
      query:
        dimensions:
          delivery_bucket: orders.delivery_bucket
        measures:
          delivery_days: null
        sort:
          - field: delivery_bucket
            direction: asc
    status_funnel:
      title: Orders by status funnel
      type: funnel
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
    delivery_funnel:
      title: Delivery speed funnel
      type: funnel
      query:
        dimensions:
          delivery_bucket: orders.delivery_bucket
        measures:
          order_count: null
        sort:
          - field: delivery_bucket
            direction: asc
    status_funnel_left:
      title: Left aligned status funnel
      type: funnel
      presentation:
        align: left
        sort: ascending
        show_labels: true
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: asc
    category_treemap:
      title: Category revenue treemap
      type: treemap
      query:
        dimensions:
          category: orders.category
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 18
    state_treemap:
      title: State order treemap
      type: treemap
      query:
        dimensions:
          state: customers.state
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 18
    category_treemap_roam:
      title: Navigable category and status treemap
      type: treemap
      presentation:
        roam: true
        breadcrumb: true
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          revenue: null
        sort:
          - field: value
            direction: desc
        limit: 80
    total_orders_gauge:
      title: Total orders gauge
      type: gauge
      query:
        measures:
          order_count: null
    review_gauge:
      title: Average review gauge
      type: gauge
      query:
        measures:
          review_score: null
    review_gauge_thresholds:
      title: Review gauge with thresholds
      type: gauge
      presentation:
        minimum: 0
        maximum: 5
        progress_width: 16
        thresholds:
          - value: 3
            tone: danger
          - value: 4
            tone: warning
          - value: 5
            tone: success
      query:
        measures:
          review_score: null
    category_status_heatmap:
      title: Category by order status
      type: heatmap
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 120
    category_status_heatmap_labels:
      title: Labeled category status heatmap
      type: heatmap
      presentation:
        show_labels: true
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 80
    category_status_flow:
      title: Category to status flow
      type: sankey
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 60
    category_status_flow_spacious:
      title: Spacious category to status flow
      type: sankey
      presentation:
        node_gap: 18
        curveness: 0.32
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 60
    category_status_graph:
      title: Category and status network
      type: graph
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 60
    category_status_graph_circular:
      title: Circular category and status network
      type: graph
      presentation:
        layout: circular
        curveness: 0.28
        focus: adjacency
      query:
        dimensions:
          category: orders.category
          status: orders.status
        measures:
          order_count: null
        sort:
          - field: value
            direction: desc
        limit: 60
    state_revenue_map:
      title: Revenue by state
      type: map
      presentation: {}
      query:
        dimensions:
          state: customers.state
        measures:
          revenue: null
        sort:
          - field: revenue
            direction: desc
        limit: 27
      geo:
        layers:
          - id: states
            kind: choropleth
            geometry_asset: brazil_states
            join: state
            value: revenue
    state_revenue_map_labeled:
      title: Labeled revenue map
      type: map
      presentation:
        show_labels: true
      query:
        dimensions:
          state: customers.state
        measures:
          revenue: null
        sort:
          - field: revenue
            direction: desc
        limit: 27
      geo:
        controls:
          zoom: true
          reset: true
          compass: true
        layers:
          - id: states
            kind: choropleth
            geometry_asset: brazil_states
            join: state
            value: revenue
    customer_point_map:
      title: Orders by ZIP area
      description: Clusters real Olist ZIP-prefix centroids sized by order volume.
      type: map
      query:
        dimensions:
          zip_prefix: customers.zip_prefix
          city: customers.city
          state: customers.state
          latitude: customers.latitude
          longitude: customers.longitude
        measures:
          order_count: null
        sort:
          - field: order_count
            direction: desc
          - field: zip_prefix
            direction: asc
        limit: 20000
      geo:
        controls:
          zoom: true
          reset: true
          compass: true
        layers:
          - id: customers
            kind: point
            latitude: latitude
            longitude: longitude
            value: order_count
            label: city
            tooltip: [zip_prefix, city, state, order_count]
            size:
              minimum_radius: 5
              maximum_radius: 28
            cluster:
              enabled: true
              radius: 48
              max_zoom: 10
              minimum_points: 2
              show_count: true
      interaction:
        point_selection:
          toggle: true
          mappings:
            - field: customers.zip_prefix
              fact: orders
              value: zip_prefix
              label: city
          targets:
            - state_order_map
            - customer_revenue_heat_map
            - customer_density_map
        spatial_selection:
          gestures: [box, lasso, radius]
          latitude:
            source: latitude
            field: customers.latitude
            fact: orders
          longitude:
            source: longitude
            field: customers.longitude
            fact: orders
          targets:
            - state_order_map
            - customer_revenue_heat_map
            - customer_density_map
    customer_revenue_heat_map:
      title: Revenue concentration
      description: Renders revenue-weighted heat across real Olist ZIP-prefix centroids.
      type: map
      query:
        dimensions:
          zip_prefix: customers.zip_prefix
          latitude: customers.latitude
          longitude: customers.longitude
        measures:
          revenue: null
        sort:
          - field: revenue
            direction: desc
          - field: zip_prefix
            direction: asc
        limit: 20000
      geo:
        theme: dark
        controls:
          zoom: true
          reset: true
          compass: true
        layers:
          - id: revenue
            kind: heat
            latitude: latitude
            longitude: longitude
            value: revenue
            tooltip: [zip_prefix, revenue]
            heat:
              radius: 28
              intensity: 1.15
    customer_density_map:
      title: Customer density
      description: Renders order density across real Olist ZIP-prefix centroids.
      type: map
      query:
        dimensions:
          zip_prefix: customers.zip_prefix
          latitude: customers.latitude
          longitude: customers.longitude
        measures:
          order_count: null
        sort:
          - field: order_count
            direction: desc
          - field: zip_prefix
            direction: asc
        limit: 20000
      geo:
        controls:
          zoom: true
          reset: true
          compass: true
        layers:
          - id: customers
            kind: density
            latitude: latitude
            longitude: longitude
            value: order_count
            tooltip: [zip_prefix, order_count]
            heat:
              radius: 22
              intensity: 1.35
    state_reference_map:
      title: Brazil state reference boundaries
      description: Renders an immutable reference polygon asset without a data join.
      type: map
      query:
        dimensions:
          state: customers.state
        measures:
          order_count: null
        limit: 27
      geo:
        basemap: blank
        layers:
          - id: state_boundaries
            kind: reference
            geometry_asset: brazil_states
            stroke:
              color: "#57606a"
              width: 1.5
              opacity: 1
            opacity: 0.12
    million_point_map:
      title: One million governed locations
      description: Exercises viewport aggregation over exactly one million deterministic points while rendering at most 5,000 features.
      type: map
      query:
        table: spatial_load_points
        dimensions:
          point_id: spatial_load_points.point_id
          city: spatial_load_points.city
          state: spatial_load_points.state
          latitude: spatial_load_points.latitude
          longitude: spatial_load_points.longitude
        measures:
          point_count:
            measure: fixture_points
        sort:
          - field: point_id
            direction: asc
        limit: 1000000
      geo:
        controls:
          zoom: true
          reset: true
          compass: true
        camera:
          mode: fit_data
          padding: 36
          min_zoom: 2
          max_zoom: 14
        layers:
          - id: fixture
            kind: point
            latitude: latitude
            longitude: longitude
            value: point_count
            label: city
