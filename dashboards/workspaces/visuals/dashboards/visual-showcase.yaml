apiVersion: leapview.dev/v1
kind: Dashboard
metadata:
  workspace: visuals
  name: visual-showcase
  title: Visual Showcase
  description: Sales, order, category, and delivery overview.
  tags:
  - dev
  - visuals
  - qa
spec:
  semanticModel: visuals
  filters:
    purchase_date:
      type: date_range
      label: Period
      description: Filters dashboard content by order purchase date.
      url_param: period
      from_url_param: from
      to_url_param: to
      default:
        preset: all
      custom: true
      presets:
      - value: all
        label: All orders
      - value: recent
        label: Latest 90 days
        relative_days: 90
      - value: '2018'
        label: '2018'
        from: '2018-01-01'
        to: '2019-01-01'
      - value: '2017'
        label: '2017'
        from: '2017-01-01'
        to: '2018-01-01'
      field: orders.purchase_timestamp
    state:
      type: multi_select
      label: State
      description: Filters dashboard content by customer state.
      url_param: state
      operator: in
      values:
        source: distinct
        limit: 50
      field: customers.state
    category:
      type: text
      label: Category
      description: Filters dashboard content by product category text.
      url_param: category
      operator_url_param: category_op
      default_operator: contains
      operators:
      - contains
      - equals
      - starts_with
      - not_contains
      field: orders.category
  visuals:
    total_orders:
      type: kpi
      description: Shows the filtered count of distinct orders.
      shape: single_value
      query:
        measures:
          order_count: null
      options:
        note: Filtered order count
        tone: ink
    revenue_kpi:
      type: kpi
      description: Shows filtered total payment revenue.
      shape: single_value
      query:
        measures:
          revenue: null
      options:
        note: Payment value
        tone: green
    aov_kpi:
      type: kpi
      description: Shows average order value for the current filters.
      shape: single_value
      query:
        measures:
          aov: null
      options:
        note: Revenue per order
        tone: amber
    review_kpi:
      type: kpi
      description: Shows average review score for the current filters.
      shape: single_value
      query:
        measures:
          review_score: null
      options:
        note: Average score
        tone: coral
    revenue:
      title: Revenue by month
      description: Tracks monthly revenue over the selected period.
      type: area
      query:
        dimensions:
          purchase_month: orders.purchase_month
        measures:
          revenue: null
        sort:
        - field: purchase_month
          direction: asc
        limit: 30
      interaction:
        point_selection:
          toggle: true
          mappings:
          - field: orders.purchase_month
            fact: orders
            value: label
            label: label
          targets:
          - orders
          - categories
          - delivery
          - orders_table
    orders:
      title: Orders by status
      description: Breaks down orders by lifecycle status.
      type: donut
      query:
        dimensions:
          status: orders.status
        measures:
          order_count: null
        sort:
        - field: value
          direction: desc
      interaction:
        point_selection:
          toggle: true
          mappings:
          - field: orders.status
            fact: orders
            value: label
            label: label
          targets:
          - revenue
          - categories
          - delivery
          - orders_table
    orders_by_month_status:
      title: Orders by month and status
      description: Compares monthly order volume split by status.
      shape: category_series_value
      renderer: echarts
      type: column
      options:
        stacked: true
      query:
        dimensions:
          purchase_month: orders.purchase_month
        series:
          field: orders.status
          alias: status
        measures:
          order_count: null
        sort:
        - field: purchase_month
          direction: asc
        limit: 40
      interaction:
        point_selection:
          toggle: true
          mappings:
          - field: orders.purchase_month
            fact: orders
            value: label
            label: label
          targets:
          - orders
          - categories
          - delivery
          - orders_table
    categories:
      title: Top product categories
      description: Ranks product categories by revenue.
      type: bar
      query:
        dimensions:
          category: orders.category
        measures:
          revenue: null
        sort:
        - field: value
          direction: desc
        limit: 10
      interaction:
        point_selection:
          toggle: true
          mappings:
          - field: orders.category
            fact: orders
            value: label
            label: label
          targets:
          - revenue
          - orders
          - delivery
          - orders_table
    delivery:
      title: Delivery speed
      description: Compares order volume across delivery-speed buckets.
      type: bar
      query:
        dimensions:
          delivery_bucket: orders.delivery_bucket
        measures:
          order_count: null
        sort:
        - field: delivery_bucket
          direction: asc
      interaction:
        point_selection:
          toggle: true
          mappings:
          - field: orders.delivery_bucket
            fact: orders
            value: label
            label: label
          targets:
          - revenue
          - orders
          - categories
          - orders_table
    state_status_heatmap:
      title: State by order status
      description: Shows order status concentration by customer state.
      shape: matrix
      renderer: echarts
      type: heatmap
      query:
        dimensions:
          state: customers.state
          status: orders.status
        measures:
          order_count: null
        sort:
        - field: state
          direction: asc
        - field: status
          direction: asc
        limit: 120
    status_delivery_flow:
      title: Status to delivery speed
      description: Shows flow from order status to delivery-speed bucket.
      shape: graph
      renderer: echarts
      type: sankey
      query:
        dimensions:
          status: orders.status
          delivery_bucket: orders.delivery_bucket
        measures:
          order_count: null
        sort:
        - field: value
          direction: desc
        limit: 40
    delivery_distribution:
      title: Delivery day distribution
      description: Summarizes delivery-day distribution by speed bucket.
      shape: distribution
      renderer: echarts
      type: boxplot
      query:
