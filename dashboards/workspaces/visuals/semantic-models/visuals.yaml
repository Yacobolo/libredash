apiVersion: leapview.dev/v1
kind: SemanticModel
metadata:
  workspace: visuals
  name: visuals
  title: Visuals Semantic Model
  description: Rich Olist semantic model used for visual renderer and table QA coverage.
spec:
  tables:
  - orders
  - customers
  - zip_geolocations
  - delivery_routes
  - spatial_load_points
  relationships:
  - id: orders_customers
    description: Links each order to the customer who placed it.
    from: orders.customer_id
    to: customers.customer_id
    cardinality: many_to_one
  - id: delivery_routes_orders
    description: Applies governed order and customer filters to delivery-route vertices.
    from: delivery_routes.order_id
    to: orders.order_id
    cardinality: many_to_one
  dimensions:
    purchase_timestamp:
      type: timestamp
      bindings:
        orders: {field: orders.purchase_timestamp}
    purchase_date:
      type: date
      bindings:
        orders: {field: orders.purchase_date}
    state:
      type: string
      bindings:
        orders:
          field: customers.state
          path: [orders_customers]
        delivery_routes:
          field: customers.state
          path: [delivery_routes_orders, orders_customers]
    order_status:
      type: string
      bindings:
        orders: {field: orders.status}
    category:
      type: string
      bindings:
        orders: {field: orders.category}
    delivered:
      type: boolean
      bindings:
        orders: {field: orders.is_delivered}
    delivery_days:
      type: number
      bindings:
        orders: {field: orders.delivery_days}
    revenue_amount:
      type: number
      bindings:
        orders: {field: orders.revenue}
  measures:
    fixture_points:
      label: Fixture points
      description: Count of deterministic locations in the spatial load fixture.
      fact: spatial_load_points
      aggregation: count
      empty: zero
      unit: points
      format: integer
    order_count:
      label: Orders
      description: Distinct order count.
      fact: orders
      aggregation: count_distinct
      input: {field: orders.order_id}
      empty: zero
      unit: orders
      format: integer
    revenue:
      label: Revenue
      description: Total payment revenue.
      fact: orders
      aggregation: sum
      input: {field: orders.revenue}
      empty: zero
      unit: R$
      format: currency
    revenue_min:
      label: Revenue min
      description: Minimum order revenue.
      fact: orders
      aggregation: min
      input: {field: orders.revenue}
      empty: "null"
      unit: R$
      format: currency
    revenue_max:
      label: Revenue max
      description: Maximum order revenue.
      fact: orders
      aggregation: max
      input: {field: orders.revenue}
      empty: "null"
      unit: R$
      format: currency
    review_score:
      label: Review
      description: Average order review score.
      fact: orders
      aggregation: avg
      input: {field: orders.review_score}
      empty: "null"
      format: decimal
    delivery_days:
      label: Delivery days
      description: Average delivery duration in days.
      fact: orders
      aggregation: avg
      input: {field: orders.delivery_days}
      empty: "null"
      format: decimal
    delivery_days_min:
      label: Delivery min
      description: Minimum delivery duration in days.
      fact: orders
      aggregation: min
      input: {field: orders.delivery_days}
      empty: "null"
      format: decimal
    delivery_days_max:
      label: Delivery max
      description: Maximum delivery duration in days.
      fact: orders
      aggregation: max
      input: {field: orders.delivery_days}
      empty: "null"
      format: decimal
    route_orders:
      label: Route orders
      description: Distinct orders aggregated for a seller-to-customer ZIP corridor.
      fact: delivery_routes
      aggregation: count_distinct
      input: {field: delivery_routes.order_id}
      empty: zero
      unit: orders
      format: integer
    route_revenue:
      label: Route revenue
      description: Seller-allocated revenue for actual order delivery routes.
      fact: delivery_routes
      aggregation: sum
      input: {field: delivery_routes.route_revenue}
      empty: zero
      unit: R$
      format: currency
  metrics:
    aov:
      label: AOV
      description: Average order value.
      expression: safe_divide(${revenue}, ${order_count})
      unit: R$
      format: currency
    revenue_q1:
      label: Revenue lower bound
      description: Minimum order revenue used as the lower showcase bound.
      expression: ${revenue_min}
      unit: R$
      format: currency
    revenue_q3:
      label: Revenue upper bound
      description: Maximum order revenue used as the upper showcase bound.
      expression: ${revenue_max}
      unit: R$
      format: currency
    delivery_days_q1:
      label: Delivery lower bound
      description: Minimum delivery duration used as the lower showcase bound.
      expression: ${delivery_days_min}
      format: decimal
    delivery_days_q3:
      label: Delivery upper bound
      description: Maximum delivery duration used as the upper showcase bound.
      expression: ${delivery_days_max}
      format: decimal
