apiVersion: leapview.dev/v1
kind: SemanticModel
metadata:
  workspace: visuals
  name: visuals
  title: Visuals Semantic Model
  description: Rich Olist semantic model used for visual renderer and table QA coverage.
spec:
  tables:
  - orders
  - customers
  relationships:
  - id: orders_customers
    description: Links each order to the customer who placed it.
    from: orders.customer_id
    to: customers.customer_id
    cardinality: many_to_one
  measures:
    order_count:
      label: Orders
      description: Distinct order count.
      fact: orders
      aggregation: count_distinct
      input: {field: orders.order_id}
      empty: zero
      unit: orders
      format: integer
    revenue:
      label: Revenue
      description: Total payment revenue.
      fact: orders
      aggregation: sum
      input: {field: orders.revenue}
      empty: zero
      unit: R$
      format: currency
    revenue_min:
      label: Revenue min
      description: Minimum order revenue.
      fact: orders
      aggregation: min
      input: {field: orders.revenue}
      empty: "null"
      unit: R$
      format: currency
    revenue_max:
      label: Revenue max
      description: Maximum order revenue.
      fact: orders
      aggregation: max
      input: {field: orders.revenue}
      empty: "null"
      unit: R$
      format: currency
    review_score:
      label: Review
      description: Average order review score.
      fact: orders
      aggregation: avg
      input: {field: orders.review_score}
      empty: "null"
      format: decimal
    delivery_days:
      label: Delivery days
      description: Average delivery duration in days.
      fact: orders
      aggregation: avg
      input: {field: orders.delivery_days}
      empty: "null"
      format: decimal
    delivery_days_min:
      label: Delivery min
      description: Minimum delivery duration in days.
      fact: orders
      aggregation: min
      input: {field: orders.delivery_days}
      empty: "null"
      format: decimal
    delivery_days_max:
      label: Delivery max
      description: Maximum delivery duration in days.
      fact: orders
      aggregation: max
      input: {field: orders.delivery_days}
      empty: "null"
      format: decimal
  metrics:
    aov:
      label: AOV
      description: Average order value.
      expression: safe_divide(${revenue}, ${order_count})
      unit: R$
      format: currency
    revenue_q1:
      label: Revenue lower bound
      description: Minimum order revenue used as the lower showcase bound.
      expression: ${revenue_min}
      unit: R$
      format: currency
    revenue_q3:
      label: Revenue upper bound
      description: Maximum order revenue used as the upper showcase bound.
      expression: ${revenue_max}
      unit: R$
      format: currency
    delivery_days_q1:
      label: Delivery lower bound
      description: Minimum delivery duration used as the lower showcase bound.
      expression: ${delivery_days_min}
      format: decimal
    delivery_days_q3:
      label: Delivery upper bound
      description: Maximum delivery duration used as the upper showcase bound.
      expression: ${delivery_days_max}
      format: decimal
