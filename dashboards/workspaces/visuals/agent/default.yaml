apiVersion: libredash.dev/v1
kind: WorkspaceAgentPolicy
metadata:
  workspace: visuals
  name: default
spec:
  enabled: true
  tools:
    allow:
    - search_workspace
    - list_assets
    - describe_asset
    - asset_lineage
    - list_workspace_asset_edges
    - list_dashboards
    - describe_dashboard
    - describe_dashboard_page
    - list_dashboard_filter_values
    - query_dashboard_page
    - query_dashboard_visual_data
    - query_dashboard_table
    - list_semantic_models
    - describe_model
    - list_semantic_datasets
    - describe_semantic_dataset
    - list_semantic_fields
    - preview_semantic_dataset
    - query_semantic_model
    - explain_semantic_preview
    - explain_semantic_model_query
    - query_visual
    deny: []
  instructions: Use the visuals workspace for renderer QA, visual coverage, and dashboard component development questions.
