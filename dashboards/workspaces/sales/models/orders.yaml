apiVersion: leapview.dev/v1
kind: ModelTable
metadata:
  workspace: sales
  name: orders
  title: Sales Orders
  description: Order-grain sales table with revenue, category, status, and customer.
spec:
  primaryKey: order_id
  sources:
    - olist.orders
    - olist.payments
    - olist.order_items
    - olist.products
    - olist.translations
  fields:
    order_id: {label: Order ID}
    customer_id: {label: Customer ID}
    purchase_month: {label: Purchase month}
    purchase_date: {label: Purchase date}
    purchase_timestamp: {label: Purchase timestamp}
    status: {label: Status}
    category: {label: Category}
    revenue: {label: Revenue}
  transform:
    sql: |
      WITH revenue AS (
        SELECT order_id, SUM(try_cast(payment_value AS DOUBLE)) AS revenue
        FROM source."olist.payments"
        GROUP BY order_id
      ),
      category AS (
        SELECT
          oi.order_id,
          MIN(COALESCE(t.product_category_name_english, p.product_category_name, 'uncategorized')) AS category
        FROM source."olist.order_items" oi
        LEFT JOIN source."olist.products" p ON p.product_id = oi.product_id
        LEFT JOIN source."olist.translations" t ON t.product_category_name = p.product_category_name
        GROUP BY oi.order_id
      )
      SELECT
        o.order_id,
        o.customer_id,
        CAST(o.order_purchase_timestamp AS TIMESTAMP) AS purchase_timestamp,
        CAST(o.order_purchase_timestamp AS DATE) AS purchase_date,
        strftime(CAST(o.order_purchase_timestamp AS TIMESTAMP), '%Y-%m') AS purchase_month,
        o.order_status AS status,
        COALESCE(category.category, 'uncategorized') AS category,
        round(COALESCE(revenue.revenue, 0), 2) AS revenue
      FROM source."olist.orders" o
      LEFT JOIN revenue ON revenue.order_id = o.order_id
      LEFT JOIN category ON category.order_id = o.order_id
