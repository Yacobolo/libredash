apiVersion: leapview.dev/v1
kind: SemanticModel
metadata:
  workspace: sales
  name: sales
  title: Sales Semantic Model
spec:
  tables:
    - orders
    - customers
  relationships:
    - id: orders_customers
      from: orders.customer_id
      to: customers.customer_id
      cardinality: many_to_one
  dimensions:
    purchase_date:
      type: date
      bindings:
        orders: {field: orders.purchase_date}
    state:
      type: string
      bindings:
        orders:
          field: customers.state
          path: [orders_customers]
    category:
      type: string
      bindings:
        orders: {field: orders.category}
  measures:
    order_count:
      label: Orders
      fact: orders
      aggregation: count_distinct
      input: {field: orders.order_id}
      empty: zero
    revenue:
      label: Revenue
      fact: orders
      aggregation: sum
      input: {field: orders.revenue}
      empty: zero
      format: currency
  metrics:
    aov:
      label: Average order value
      expression: safe_divide(${revenue}, ${order_count})
      format: currency
