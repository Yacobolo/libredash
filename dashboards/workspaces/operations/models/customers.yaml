apiVersion: leapview.dev/v1
kind: ModelTable
metadata:
  workspace: operations
  name: customers
  title: Customers
spec:
  primaryKey: customer_id
  sources:
    - olist.customers
  fields:
    customer_id: {label: Customer ID}
    state: {label: State}
  transform:
    sql: |
      SELECT customer_id, customer_state AS state
      FROM source."olist.customers"
