apiVersion: leapview.dev/v1
kind: SemanticModel
metadata:
  workspace: operations
  name: operations
  title: Operations Semantic Model
spec:
  tables:
    - orders
    - customers
  relationships:
    - id: orders_customers
      from: orders.customer_id
      to: customers.customer_id
      cardinality: many_to_one
  dimensions:
    state:
      type: string
      bindings:
        orders:
          field: customers.state
          path: [orders_customers]
    status:
      type: string
      bindings:
        orders: {field: orders.status}
    delivery_bucket:
      type: string
      bindings:
        orders: {field: orders.delivery_bucket}
  measures:
    order_count:
      label: Orders
      fact: orders
      aggregation: count_distinct
      input: {field: orders.order_id}
      empty: zero
    review_score:
      label: Review score
      fact: orders
      aggregation: avg
      input: {field: orders.review_score}
      empty: "null"
    delivery_days:
      label: Delivery days
      fact: orders
      aggregation: avg
      input: {field: orders.delivery_days}
      empty: "null"
