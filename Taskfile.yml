version: '3'

tasks:
  dev:
    desc: Start the managed LeapView dev server for this worktree
    cmds:
      - task: generate
      - task: build
      - task: bootstrap
      - ./scripts/dev-server.sh start

  dev:movielens:
    desc: Start the managed LeapView dev server with the MovieLens 32M experiment project
    cmds:
      - task: generate
      - task: build
      - task: bootstrap:movielens
      - LEAPVIEW_DEV_RESTART=1 LEAPVIEW_DEV_READY_ATTEMPTS=1800 ./scripts/dev-server.sh start dashboards/experiments/movielens/leapview.yaml movielens .data/movielens

  dev:quack:
    desc: Start the managed LeapView dev server with the local Quack profile
    cmds:
      - task: generate
      - task: build
      - ./scripts/dev-profile.sh quack start

  bootstrap:
    desc: Download/sync Olist CSVs if missing
    cmds:
      - go run ./internal/tools/bootstrapolist --out .data/olist

  bootstrap:movielens:
    desc: Download/sync MovieLens 32M CSVs if missing
    cmds:
      - go run ./internal/tools/bootstrapmovielens --out .data/movielens

  dev:stop:
    desc: Stop the managed LeapView dev server for this worktree
    cmds:
      - ./scripts/dev-server.sh stop

  dev:quack:stop:
    desc: Stop the managed LeapView dev server with the local Quack profile
    cmds:
      - ./scripts/dev-profile.sh quack stop

  dev:status:
    desc: Show managed LeapView dev server status
    cmds:
      - ./scripts/dev-server.sh status

  deploy:dev:
    desc: Sync Olist data and atomically deploy all project workspaces
    cmds:
      - |
        test -f .tmp/dev-server.port || { echo "Dev server port file missing. Run task dev first."; exit 1; }
        PORT="$(cat .tmp/dev-server.port)"
        curl -fsS "http://localhost:${PORT}/workspaces" >/dev/null || { echo "Dev server is not running on http://localhost:${PORT}. Run task dev first."; exit 1; }
        SYNC_OUTPUT="$(go run ./cmd/leapview data sync --project dashboards/leapview.yaml --connection olist --from .data/olist --target "http://localhost:${PORT}" --token dev)"
        printf '%s\n' "$SYNC_OUTPUT"
        REVISION="$(printf '%s\n' "$SYNC_OUTPUT" | awk '$1 == "staged" { print $2 }')"
        printf '%s\n' "$REVISION" | grep -Eq '^sha256:[0-9a-f]{64}$' || { echo "Managed data sync did not return a canonical revision."; exit 1; }
        go run ./cmd/leapview deploy --project dashboards/leapview.yaml --revision "olist=$REVISION" --target "http://localhost:${PORT}" --token dev --auto-approve

  dev:quack:status:
    desc: Show managed LeapView dev server status with the local Quack profile
    cmds:
      - ./scripts/dev-profile.sh quack status

  dev:logs:
    desc: Tail managed LeapView dev server logs
    cmds:
      - ./scripts/dev-server.sh logs

  dev:quack:logs:
    desc: Tail managed LeapView dev server logs with the local Quack profile
    cmds:
      - ./scripts/dev-profile.sh quack logs

  node:deps:
    desc: Install JavaScript dependencies with Bun
    cmds:
      - bun install --frozen-lockfile

  build:
    desc: Build browser assets
    deps:
      - node:deps
    cmds:
      - bun run build

  site:build:
    desc: Build the LeapView public site assets from generated contracts
    cmds:
      - task: ui-signals:generate
      - task: node:deps
      - bun run build:site

  site:binary:
    desc: Build the independently deployable public site from generated documentation
    cmds:
      - task: generate
      - task: site:build
      - go build -o bin/leapview-site ./cmd/leapview-site

  site:image:
    desc: Build the production LeapView public site OCI image
    cmds:
      - docker build --file Dockerfile.site --tag leapview-site:local .

  site:dev:
    desc: Start the public site from generated documentation on http://localhost:8081
    cmds:
      - task: generate
      - task: site:build
      - go run ./cmd/leapview-site

  site:product-screenshot:
    desc: Refresh light and dark homepage screenshots from the deployed Visual Showcase
    cmds:
      - task: generate
      - task: build
      - bun scripts/capture_site_product.ts

  bench:datastar-bridge:
    desc: Benchmark legacy, Ignition, and DatastarLit bridges in Chromium
    deps:
      - node:deps
    cmds:
      - bun run bench:datastar-bridge

  qa:ui-framework:
    desc: Run browser QA for the stream-first DatastarLit UI framework
    deps:
      - node:deps
    cmds:
      - bun scripts/qa_ui_framework.ts

  qa:movielens-performance:
    desc: Run the local/nightly dashboard performance runner with the MovieLens scenario (not part of CI)
    deps:
      - node:deps
    cmds:
      - bun run qa:movielens-performance

  qa:dashboard-performance:
    desc: Run a configured local/nightly performance scenario against a running dev server (not part of CI)
    deps:
      - node:deps
    cmds:
      - bun run qa:dashboard-performance

  generate:
    desc: Generate all checked-out derived code needed for local development
    cmds:
      - task: db:generate
      - task: config:generate
      - task: api:generate
      - task: ui-signals:generate
      - task: schema:generate
      - task: cli-docs:generate
      - task: node:deps
      - task: docs:render

  docs:generate:
    desc: Generate reference documentation, the unified catalog, and the FTS5 search index
    cmds:
      - task: schema:generate
      - task: cli-docs:generate
      - task: node:deps
      - task: docs:render

  docs:render:
    internal: true
    method: checksum
    deps:
      - visual-docs:generate
    sources:
      - Taskfile.yml
      - docs/navigation.yaml
      - docs/*.md
      - docs/articles/**/*.md
      - docs/guides/**/*.md
      - docs/api/*.md
      - docs/api/catalog.json
      - docs/api/operations.json
      - docs/reference/cli/*.md
      - docs/reference/cli/catalog.json
      - docs/reference/cli/manifest.json
      - docs/reference/config/*.md
      - docs/reference/config/catalog.json
      - docs/visuals/*.md
      - docs/visuals/catalog.json
      - internal/tools/docsitegen/**/*.go
    generates:
      - docs/catalog.json
      - docs/llms.txt
      - docs/search-index.sqlite3
    cmds:
      - bun run docs:validate-diagrams
      - go run ./internal/tools/docsitegen

  docs:check:
    desc: Verify the unified documentation catalog and FTS5 search index are current
    deps:
      - node:deps
    cmds:
      - bun run docs:validate-diagrams
      - go run ./internal/tools/visualdocgen --check
      - go run ./internal/tools/docsitegen --check
      - go test ./internal/site/http -run '^TestEveryRenderedDocumentationLinkResolves$' -count=1

  visual-docs:generate:
    desc: Compile executable visual documentation examples into browser payloads
    deps:
      - db:generate
      - config:generate
      - api:generate
      - ui-signals:generate
    method: checksum
    sources:
      - Taskfile.yml
      - docs/visuals/*.md
      - docs/visuals/catalog.json
      - internal/tools/visualdocgen/**/*.go
      - internal/tools/visualdocgen/testdata/**/*
      - internal/visualdocs/**/*.go
      - internal/dashboard/**/*.go
      - internal/analytics/**/*.go
      - internal/workspace/compiler/**/*.go
    generates:
      - docs/visuals/examples.gen.json
    cmds:
      - go run ./internal/tools/visualdocgen

  cli-docs:generate:
    desc: Generate public CLI reference documentation from Cobra commands
    deps:
      - db:generate
      - config:generate
      - api:generate
      - ui-signals:generate
    method: checksum
    sources:
      - Taskfile.yml
      - internal/cli/**/*.go
      - internal/tools/clidocgen/**/*.go
    generates:
      - docs/reference/cli/catalog.json
      - docs/reference/cli/manifest.json
    cmds:
      - go run ./internal/tools/clidocgen

  db:generate:
    desc: Generate SQLite adapter code from the checked-in schema and queries
    method: checksum
    sources:
      - Taskfile.yml
      - sqlc.yaml
      - internal/platform/migrations/*.sql
      - internal/platform/db/queries/*.sql
    generates:
      - internal/platform/db/db.go
      - internal/platform/db/models.go
      - internal/platform/db/*.sql.go
    cmds:
      - go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0 generate

  config:generate:
    desc: Generate runtime configuration, reference documentation, example environment, and schema
    method: checksum
    sources:
      - Taskfile.yml
      - internal/configspec/spec.go
      - internal/tools/configgen/main.go
    generates:
      - internal/config/config_gen.go
      - internal/configspec/names_gen.go
      - docs/configuration.md
      - .env.example
      - schemas/config/environment.schema.json
    cmds:
      - go run ./internal/tools/configgen

  config:check:
    desc: Verify generated configuration artifacts are current
    cmds:
      - go run ./internal/tools/configgen --check

  generated:check:
    desc: Verify intentional public contract snapshots are current
    deps:
      - generate
    cmds:
      - task: config:check
      - |
        changed="$(git status --porcelain -- .env.example docs/api/openapi.yaml docs/llms.txt schemas/config schemas/json)"
        test -z "$changed" || { printf 'public contract snapshots are stale:\n%s\n' "$changed" >&2; exit 1; }

  api:generate:
    desc: Generate headless API contract artifacts and APIGen Go surfaces
    method: checksum
    sources:
      - Taskfile.yml
      - api/apigen.yaml
      - api/typespec/**/*.tsp
      - internal/tools/openapidocgen/**/*.go
    generates:
      - api/gen/json-ir.json
      - api/gen/openapi.yaml
      - internal/api/gen/request_models.gen.go
      - internal/api/gen/server.apigen.gen.go
      - internal/cli/gen/apigen_registry.gen.go
      - docs/api/catalog.json
      - docs/api/openapi.yaml
      - docs/api/operations.json
    cmds:
      - go run github.com/Yacobolo/toolbelt/apigen/cmd/apigen@v0.5.3 typespec-compile -manifest api/apigen.yaml -target leapview-v1
      - go run github.com/Yacobolo/toolbelt/apigen/cmd/apigen@v0.5.3 all -manifest api/apigen.yaml -target leapview-v1
      - go run ./internal/tools/openapidocgen

  schema:generate:
    desc: Generate JSON Schema artifacts for LeapView YAML contracts
    deps:
      - db:generate
      - config:generate
      - api:generate
      - ui-signals:generate
    method: checksum
    sources:
      - Taskfile.yml
      - cmd/leapview/**/*.go
      - internal/cli/**/*.go
      - internal/configschema/**/*.go
      - internal/configschema/**/*.cue
      - internal/dashboard/report/**/*.go
      - internal/semantic/**/*.go
      - internal/tools/schemadocgen/**/*.go
      - dashboards/**/*.yaml
    generates:
      - schemas/json/dashboard.schema.json
      - schemas/json/semantic-model.schema.json
      - docs/reference/config/catalog.json
    cmds:
      - go run ./cmd/leapview schema export --format json-schema --out schemas/json
      - go run ./internal/tools/schemadocgen

  ui-signals:generate:
    desc: Generate UI signal Go and TypeScript contracts from TypeSpec
    method: checksum
    sources:
      - Taskfile.yml
      - api/apigen.yaml
      - api/signals/**/*.tsp
      - internal/tools/uisignalspostprocess/**/*.go
    generates:
      - api/gen/ui-signals-ir.json
      - internal/ui/signals/models.gen.go
      - web/generated/signals/index.ts
    cmds:
      - go run github.com/Yacobolo/toolbelt/apigen/cmd/apigen@v0.5.3 typespec-compile -manifest api/apigen.yaml -target ui-signals
      - go run github.com/Yacobolo/toolbelt/apigen/cmd/apigen@v0.5.3 all -manifest api/apigen.yaml -target ui-signals
      - go run ./internal/tools/uisignalspostprocess

  test:
    desc: Run tests
    cmds:
      - task: generate
      - task: build
      - bun run test:primer-primitives
      - bun run test:docs-diagrams
      - bun run test:primer-alignment
      - bun run test:theme
      - bun run test:site
      - bun run test:datastar-lit
      - bun run test:app-shell
      - bun run test:interaction-selection
      - bun run test:movielens-performance-harness
      - bun run test:record-table
      - bun run test:visual-modal
      - bun run test:catalog-page
      - bun run test:dashboard-page
      - bun run test:chat-composer
      - bun run test:chat-page
      - bun run test:chat-thread
      - bun run test:code-block
      - bun run test:workspace-page
      - bun run test:data-explorer
      - bun run test:windowed-table
      - bun run test:filter-menu
      - bun run test:datastar-inspector
      - bun run test:admin-page
      - bun run test:code-editor
      - bun run test:markdown-view
      - bun run test:login-page
      - bun run test:topology-background
      - bun run test:production-assets
      - bun run test:asset-lineage
      - bun run test:semantic-model-graph
      - bun run typecheck:app
      - bun run typecheck:contracts
      - go test ./...

  ci:
    desc: Run the full CI test suite
    deps:
      - test
    cmds:
      - task: generated:check
      - go vet ./...
      - go test -race ./pkg/... ./internal/access ./internal/runtimehost
      - task: qa:ui-framework
      - task: deploy:check

  deploy:check:
    desc: Validate the supported single-node deployment and lifecycle contracts
    cmds:
      - go test ./cmd/leapviewctl ./internal/composectl ./deploy/compose
      - go test ./deploy/hetzner
      - terraform fmt -check -recursive deploy/hetzner
      - terraform -chdir=deploy/hetzner init -backend=false -input=false
      - terraform -chdir=deploy/hetzner validate
      - terraform -chdir=deploy/hetzner test

  node:audit:
    desc: Scan JavaScript dependencies for known vulnerabilities
    deps:
      - node:deps
    cmds:
      - bun audit

  vuln:
    desc: Scan Go dependencies and call paths for known vulnerabilities
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  agent:e2e:
    desc: Run opt-in DeepSeek-backed headless agent E2E
    cmds:
      - bash scripts/agent_e2e.sh
