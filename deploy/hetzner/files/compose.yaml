services:
  libredash:
    image: ${LIBREDASH_IMAGE}
    container_name: libredash
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    mem_limit: ${APP_MEMORY_LIMIT:-3g}
    stop_grace_period: 2m
    env_file:
      - /etc/libredash/libredash.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/lib/libredash:/var/lib/libredash
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m
    healthcheck:
      test: ["CMD", "libredash", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: ${CADDY_IMAGE}
    container_name: libredash-caddy
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    stop_grace_period: 30s
    env_file:
      - /etc/libredash/deployment.env
    depends_on:
      libredash:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /etc/libredash/Caddyfile:/etc/caddy/Caddyfile:ro
      - libredash-caddy-data:/data
      - libredash-caddy-config:/config
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  libredash-caddy-data:
  libredash-caddy-config:
