name: ${COMPOSE_PROJECT_NAME:-leapview}

services:
  leapview:
    image: ${LEAPVIEW_IMAGE:?set LEAPVIEW_IMAGE in deployment.env}
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 1024
    mem_limit: ${APP_MEMORY_LIMIT:-3g}
    stop_grace_period: 2m
    env_file: [leapview.env]
    ports:
      - "${COMPOSE_APP_BIND:-127.0.0.1:8080}:8080"
    volumes:
      - leapview-state:/var/lib/leapview
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m
    healthcheck:
      test: [CMD, leapview, healthcheck]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    logging:
      driver: local
      options: {max-size: 20m, max-file: "5"}

volumes:
  leapview-state:
